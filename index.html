<!DOCTYPE html>
<html>
<head>
    <title>Rodent III Fischer - Pro Match</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #262421; color: #bababa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        #myBoard { margin: 20px auto; width: 450px; border: 5px solid #312e2b; border-radius: 4px; }
        .controls { margin-top: 20px; }
        button { background: #454341; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #53504d; }
        .status-box { font-size: 1.2em; margin-top: 10px; color: #fff; }
        
        /* Side Selection Overlay */
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #312e2b; padding: 30px; border-radius: 8px; border: 1px solid #454341; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="modal">
            <h3>Choose Your Side</h3>
            <button onclick="startGame('w')">White</button>
            <button onclick="startGame('b')">Black</button>
        </div>
    </div>

    <div class="status-box" id="status">Select a side to begin</div>
    <div id="myBoard"></div>

    <div class="controls">
        <button onclick="offerDraw()">Offer Draw</button>
        <button onclick="resetGame()">New Game</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var playerColor = 'w';
        var socket = new WebSocket('wss://ProtonnDev-engine.hf.space/rodent3-fischer');

        socket.onopen = () => { socket.send("uci"); };

        socket.onmessage = (e) => {
            if (e.data.startsWith('bestmove')) {
                const moveStr = e.data.split(' ')[1];
                game.move({
                    from: moveStr.substring(0, 2),
                    to: moveStr.substring(2, 4),
                    promotion: 'q'
                });
                board.position(game.fen());
                updateStatus();
            }
        };

        function startGame(side) {
            playerColor = side;
            document.getElementById('overlay').style.display = 'none';
            
            var config = {
                draggable: true,
                orientation: (side === 'w' ? 'white' : 'black'),
                position: 'start',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            };
            board = Chessboard('myBoard', config);
            
            // If player chose black, engine moves first
            if (playerColor === 'b') {
                engineThink();
            }
            updateStatus();
        }

        function onDragStart (source, piece) {
            if (game.game_over()) return false;
            // Prevent picking up opponent's pieces
            if ((playerColor === 'w' && piece.search(/^b/) !== -1) ||
                (playerColor === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            
            updateStatus();
            window.setTimeout(engineThink, 250);
        }

        function onSnapEnd () { board.position(game.fen()); }

        function engineThink() {
            if (game.game_over()) return;
            socket.send(`position fen ${game.fen()}`);
            socket.send("go movetime 1000");
        }

        function updateStatus () {
            let status = "";
            let moveColor = (game.turn() === 'w') ? 'White' : 'Black';

            if (game.in_checkmate()) {
                let winner = (game.turn() === 'w') ? 'Black' : 'White';
                status = `GAME OVER: ${winner} wins by Checkmate!`;
                alert(status);
            } else if (game.in_draw() || game.in_stalemate() || game.in_threefold_repetition()) {
                status = "GAME OVER: It's a Draw!";
                alert(status);
            } else {
                status = moveColor + " to move";
                if (game.in_check()) status += " (Check!)";
            }
            document.getElementById('status').innerHTML = status;
        }

        function offerDraw() {
            // Simple engine logic: Rodent III Fischer is aggressive and usually refuses draws
            alert("The Computer (Rodent III) refuses the draw offer. Play on!");
        }

        function resetGame() {
            game.reset();
            document.getElementById('overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
