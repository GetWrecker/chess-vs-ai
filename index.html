<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chess vs AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0f172a;
  color:white;
  text-align:center;
  font-family:Arial;
}

#board {
  width:320px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}

.square {
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
}

.light { background:#f0d9b5; }
.dark { background:#b58863; }

.selected { outline:2px solid yellow; }

button {
  padding:10px;
  margin:5px;
}
</style>
</head>

<body>

<h2>♟ Chess vs Computer</h2>

<button onclick="startGame('white')">Play White</button>
<button onclick="startGame('black')">Play Black</button>

<div id="board"></div>

<p id="status">Choose side</p>

<script>
const pieces = {
  r:"♜", n:"♞", b:"♝", q:"♛", k:"♚", p:"♟",
  R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔", P:"♙"
};

let game = new Chess();
let boardEl = document.getElementById("board");
let selected = null;
let playerColor = "white";
let socket;

function startGame(color){
  playerColor = color;
  game.reset();
  drawBoard();

  if(socket) socket.close();

  socket = new WebSocket("wss://ProtonnDev-engine.hf.space/rodent3-fischer");

  socket.onopen = () => {
    if(playerColor === "black"){
      setTimeout(engineMove,500);
    }
  };

  updateStatus();
}

function drawBoard(){
  boardEl.innerHTML = "";
  const board = game.board();

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const square = document.createElement("div");
      square.className = "square " + ((r+c)%2?"dark":"light");

      const piece = board[r][c];
      if(piece){
        const symbol = piece.color === "w"
          ? piece.type.toUpperCase()
          : piece.type;
        square.textContent = pieces[symbol];
      }

      square.dataset.square = String.fromCharCode(97+c)+(8-r);

      square.onclick = () => handleClick(square);

      boardEl.appendChild(square);
    }
  }
}

function handleClick(square){
  const sq = square.dataset.square;

  if(!selected){
    selected = sq;
    square.classList.add("selected");
  }else{
    const move = game.move({
      from:selected,
      to:sq,
      promotion:'q'
    });

    document.querySelectorAll(".square").forEach(s=>s.classList.remove("selected"));
    selected = null;

    if(move){
      drawBoard();
      updateStatus();
      setTimeout(engineMove,400);
    }
  }
}

function engineMove(){
  if(game.isGameOver()) return;

  socket.send(game.fen());

  socket.onmessage = (e)=>{
    let move = e.data.trim();

    if(move.includes(" ")) move = move.split(" ")[1];

    if(!move || move.length < 4) return;

    game.move({
      from:move.slice(0,2),
      to:move.slice(2,4),
      promotion:'q'
    });

    drawBoard();
    updateStatus();
  };
}

function updateStatus(){
  let text="";

  if(game.isCheckmate()) text="Checkmate!";
  else if(game.isDraw()) text="Draw!";
  else text = game.turn()==='w'?"White turn":"Black turn";

  document.getElementById("status").innerText=text;
}
</script>

<!-- Chess engine logic -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

</body>
</html>
