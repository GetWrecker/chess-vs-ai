<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rodent III vs Stockfish 18 Coaching</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #161512; --panel: #262421; --accent: #95bb4a; --text: #bababa; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .board-wrapper { position: relative; width: 450px; height: 450px; margin: 10px; }
        #myBoard { width: 100%; height: 100%; border: 4px solid #3c3934; }
        
        /* SVG Arrow Overlay - Must be absolute and cover the board */
        #arrow-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        
        .info-panel { background: var(--panel); padding: 15px; border-radius: 8px; width: 450px; border: 1px solid #3c3934; margin-bottom: 10px; text-align: center; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 480px; }
        button { background: #3c3934; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #4c4944; }
        
        #pgn-display { background: #111; color: #777; padding: 10px; font-family: monospace; font-size: 11px; height: 50px; overflow-y: auto; width: 460px; margin-top: 10px; border: 1px solid #333; }
        
        #setup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .setup-modal { background: var(--panel); padding: 30px; border-radius: 12px; width: 350px; text-align: center; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="setup-modal">
            <h2>Select Difficulty</h2>
            <select id="level-select" style="width:100%; padding:10px; margin-bottom:20px;">
                <option value="1">Beginner (Level 1)</option>
                <option value="7" selected>Intermediate (Level 7)</option>
                <option value="12">Expert (Level 12)</option>
                <option value="18">Master (Level 18)</option>
                <option value="20">Grandmaster (Level 20)</option>
            </select>
            <label><input type="checkbox" id="coach-toggle" checked> Enable Stockfish 18 Arrows</label>
            <button onclick="initGame()" style="background:var(--accent); color:black; width:100%; margin-top:20px;">START MATCH</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="status" style="color:var(--accent); font-weight:bold;">Waiting...</div>
        <div id="eval-info" style="font-size:0.8em; color:#888;">Coach: Idle</div>
    </div>

    <div class="board-wrapper">
        <div id="myBoard"></div>
        <svg id="arrow-svg">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orientation="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="rgba(149, 187, 74, 0.8)" />
                </marker>
            </defs>
        </svg>
    </div>

    <div id="pgn-display">PGN Record...</div>

    <div class="controls">
        <button onclick="offerDraw()" style="color:var(--accent)">Offer Draw</button>
        <button onclick="copyPGN()">Copy PGN</button>
        <button onclick="location.reload()" style="color:#ef4444; grid-column: span 2;">Resign</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board, game = new Chess();
        var rodent = new WebSocket('wss://ProtonnDev-engine.hf.space/rodent3-fischer');
        var stockfish = new WebSocket('wss://ProtonnDev-engine.hf.space/stockfish18');
        var engineEval = 0;

        function initGame() {
            const lvl = document.getElementById('level-select').value;
            document.getElementById('setup-overlay').style.display = 'none';
            
            rodent.send("uci");
            rodent.send(`setoption name Skill Level value ${lvl}`);
            stockfish.send("uci");

            board = Chessboard('myBoard', {
                position: 'start',
                draggable: false,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            $('#myBoard').on('click', '.square-55d63', onSquareClick);
            if (document.getElementById('coach-toggle').checked) requestCoach();
            updateUI();
        }

        var selectedSq = null;
        function onSquareClick() {
            const sq = $(this).data('square');
            if (game.turn() !== 'w') return;

            if (selectedSq === sq) { deselect(); return; }
            
            const p = game.get(sq);
            if (p && p.color === 'w') {
                deselect();
                selectedSq = sq;
                $(`.square-${sq}`).css('box-shadow', 'inset 0 0 3px 3px yellow');
            } else if (selectedSq) {
                const move = game.move({ from: selectedSq, to: sq, promotion: 'q' });
                if (move) {
                    board.position(game.fen());
                    deselect();
                    clearArrows();
                    updateUI();
                    setTimeout(opponentMove, 500);
                }
            }
        }

        function deselect() { selectedSq = null; $('.square-55d63').css('box-shadow', 'none'); }

        function opponentMove() {
            rodent.send(`position fen ${game.fen()}`);
            rodent.send("go depth 12");
        }

        rodent.onmessage = (e) => {
            if (e.data.includes('score cp')) {
                const match = e.data.match(/score cp (-?\d+)/);
                if (match) engineEval = parseInt(match[1]);
            }
            if (e.data.startsWith('bestmove')) {
                const m = e.data.split(' ')[1];
                game.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: 'q' });
                board.position(game.fen());
                updateUI();
                requestCoach();
            }
        };

        function requestCoach() {
            if (!document.getElementById('coach-toggle').checked) return;
            stockfish.send(`position fen ${game.fen()}`);
            stockfish.send("go depth 18");
        }

        stockfish.onmessage = (e) => {
            if (e.data.startsWith('bestmove') && game.turn() === 'w') {
                const best = e.data.split(' ')[1];
                showArrow(best.substring(0, 2), best.substring(2, 4));
            }
        };

        // --- ARROW RENDERING FIX ---
        function showArrow(from, to) {
            clearArrows();
            const fromPos = getSqPos(from);
            const toPos = getSqPos(to);

            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", fromPos.x); line.setAttribute("y1", fromPos.y);
            line.setAttribute("x2", toPos.x); line.setAttribute("y2", toPos.y);
            line.setAttribute("stroke", "rgba(149, 187, 74, 0.7)");
            line.setAttribute("stroke-width", "8");
            line.setAttribute("marker-end", "url(#arrowhead)");
            document.getElementById('arrow-svg').appendChild(line);
            document.getElementById('eval-info').innerText = `Coach Suggests: ${from} to ${to}`;
        }

        function getSqPos(sq) {
            const el = document.querySelector(`.square-${sq}`);
            const bRect = document.getElementById('myBoard').getBoundingClientRect();
            const sRect = el.getBoundingClientRect();
            // Calculate center relative to board
            return {
                x: (sRect.left - bRect.left) + (sRect.width / 2),
                y: (sRect.top - bRect.top) + (sRect.height / 2)
            };
        }

        function clearArrows() { $('#arrow-svg line').remove(); }

        function offerDraw() {
            // Evaluates based on current side's perspective
            const relEval = game.turn() === 'w' ? -engineEval : engineEval;
            if (relEval > 100) {
                alert("Computer declines: 'I have the advantage!'");
            } else {
                alert("Computer accepts: 'The position is balanced.'");
                location.reload();
            }
        }

        function updateUI() {
            document.getElementById('pgn-display').innerText = game.pgn() || "New Game";
            document.getElementById('status').innerText = game.turn() === 'w' ? "Your Turn" : "Thinking...";
        }

        function copyPGN() { navigator.clipboard.writeText(game.pgn()); alert("PGN Copied");}
    </script>
</body>
</html>
