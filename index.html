<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Chess: Rodent III vs Stockfish 18</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #161512; --panel: #262421; --accent: #95bb4a; --text: #bababa; --danger: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* Board Area */
        .board-wrapper { width: 100%; max-width: 450px; aspect-ratio: 1; margin: 10px; border: 4px solid #3c3934; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #myBoard { width: 100%; height: 100%; }
        
        /* UI Panels */
        .info-panel { background: var(--panel); padding: 15px; border-radius: 8px; width: 100%; max-width: 450px; border: 1px solid #3c3934; margin-bottom: 10px; text-align: center; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 480px; }
        button { background: #3c3934; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: all 0.2s; }
        button:hover { background: #4c4944; transform: translateY(-1px); }
        #pgn-display { background: #111; color: #71717a; padding: 10px; font-family: monospace; font-size: 11px; height: 50px; overflow-y: auto; width: 100%; max-width: 460px; margin-top: 10px; border: 1px solid #333; border-radius: 4px; }
        
        /* Overlay Modals */
        .full-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-card { background: var(--panel); padding: 30px; border-radius: 12px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #444; }
        select { width: 100%; padding: 12px; margin: 10px 0 20px; background: #333; color: white; border: 1px solid #555; border-radius: 6px; font-size: 1rem; }
        
        /* Stats Display */
        .stat-line { display: flex; justify-content: space-between; margin: 10px 0; padding: 8px; border-bottom: 1px solid #333; font-size: 1.1rem; }
        .brilliant { color: #00ebff; text-shadow: 0 0 5px rgba(0,235,255,0.3); }
        .best { color: #95bb4a; }
        .mistake { color: #ffcc00; }
        .blunder { color: #ff4d4d; }
    </style>
</head>
<body>

    <div id="setup-overlay" class="full-overlay">
        <div class="modal-card">
            <h2 style="color:white; margin-bottom:20px;">Match Settings</h2>
            <label style="display:block; text-align:left;">Choose Side:</label>
            <select id="side-select">
                <option value="w">White (Goes First)</option>
                <option value="b">Black</option>
            </select>
            
            <label style="display:block; text-align:left;">Difficulty Level:</label>
            <select id="level-select">
                <option value="800">Beginner (800 Elo)</option>
                <option value="1200">Intermediate (1200 Elo)</option>
                <option value="1800">Expert (1800 Elo)</option>
                <option value="2400">Master (2400 Elo)</option>
                <option value="3200">Grandmaster (Max Elo)</option>
            </select>
            
            <button onclick="startGame()" style="background: var(--accent); color: #161512; width: 100%; font-size: 1.1rem;">START MATCH</button>
        </div>
    </div>

    <div id="analysis-overlay" class="full-overlay" style="display: none;">
        <div class="modal-card" style="max-width: 400px;">
            <h2 style="color:white;">Game Review</h2>
            <p id="analysis-status" style="color: #888;">Requesting Stockfish 18 Analysis...</p>
            <div id="stats-output" style="margin: 25px 0;"></div>
            
            <button onclick="copyPGN()" style="width: 100%; margin-bottom: 10px;">Copy PGN</button>
            <button onclick="shareGame()" style="width: 100%; background: #1da1f2; margin-bottom: 10px;">Share on Social Media</button>
            <button onclick="location.reload()" style="width: 100%; background: none; border: 1px solid var(--accent); color: var(--accent);">New Game</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="game-status" style="color: var(--accent); font-weight: bold; font-size: 1.2rem;">Initializing...</div>
        <div id="move-info" style="font-size: 0.85em; color: #888; margin-top: 5px;">Bot: Rodent III</div>
    </div>

    <div class="board-wrapper">
        <div id="myBoard"></div>
    </div>

    <div id="pgn-display">PGN Record: [Empty]</div>

    <div class="controls">
        <button onclick="offerDraw()">Offer Draw</button>
        <button onclick="handleResign()" style="color: var(--danger);">Resign</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board, game = new Chess();
        var playerColor = 'w', botElo = 1200;
        var rodent = new WebSocket('wss://ProtonnDev-engine.hf.space/rodent3-fischer');
        var stockfish = new WebSocket('wss://ProtonnDev-engine.hf.space/stockfish18');
        var moveHistoryFENs = [];
        var currentBotEval = 0;
        var stats = { brilliant: 0, best: 0, mistake: 0, blunder: 0 };

        // --- MATCH INITIALIZATION ---
        function startGame() {
            playerColor = document.getElementById('side-select').value;
            botElo = document.getElementById('level-select').value;
            document.getElementById('setup-overlay').style.display = 'none';

            // Fixed Strength Configuration for Rodent III
            rodent.send("uci");
            rodent.send("setoption name UCI_LimitStrength value true");
            rodent.send(`setoption name UCI_Elo value ${botElo}`);
            rodent.send("isready");

            stockfish.send("uci");

            board = Chessboard('myBoard', {
                position: 'start',
                orientation: (playerColor === 'w' ? 'white' : 'black'),
                draggable: false, // Forcing Click-to-move
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            $('#myBoard').on('click', '.square-55d63', onSquareClick);
            
            if (playerColor === 'b') {
                setTimeout(botResponse, 600);
            }
            updateUI();
        }

        // --- CLICK-TO-MOVE LOGIC ---
        var sourceSquare = null;
        function onSquareClick() {
            if (game.turn() !== playerColor || game.game_over()) return;
            const square = $(this).data('square');
            const piece = game.get(square);

            if (piece && piece.color === playerColor) {
                sourceSquare = square;
                $('.square-55d63').css('box-shadow', 'none');
                $(this).css('box-shadow', 'inset 0 0 4px 4px #95bb4a');
            } else if (sourceSquare) {
                const move = game.move({ from: sourceSquare, to: square, promotion: 'q' });
                if (move) {
                    sourceSquare = null;
                    $('.square-55d63').css('box-shadow', 'none');
                    moveHistoryFENs.push(game.fen());
                    board.position(game.fen());
                    updateUI();
                    if (!checkGameOver()) setTimeout(botResponse, 400);
                }
            }
        }

        function botResponse() {
            if (game.game_over()) return;
            rodent.send(`position fen ${game.fen()}`);
            rodent.send("go depth 12");
        }

        rodent.onmessage = (e) => {
            const msg = e.data;
            if (msg.includes('score cp')) {
                const match = msg.match(/score cp (-?\d+)/);
                if (match) currentBotEval = parseInt(match[1]);
            }
            if (msg.startsWith('bestmove')) {
                const moveStr = msg.split(' ')[1];
                if (moveStr && moveStr !== '(none)') {
                    game.move({ from: moveStr.substring(0, 2), to: moveStr.substring(2, 4), promotion: 'q' });
                    moveHistoryFENs.push(game.fen());
                    board.position(game.fen());
                    updateUI();
                    checkGameOver();
                }
            }
        };

        // --- UTILITIES & DRAW/RESIGN ---
        function offerDraw() {
            // Engine Evaluation Logic:
            // currentBotEval is from engine perspective. 
            // If turn is black, +eval means black winning.
            const relativeEval = (game.turn() === 'b') ? currentBotEval : -currentBotEval;
            
            if (relativeEval > 120) {
                alert("Rodent III declines: 'I believe my position is winning!'");
            } else {
                alert("Rodent III accepts: 'The position is equal enough. Draw agreed.'");
                triggerAnalysis();
            }
        }

        function handleResign() {
            if (confirm("Are you sure you want to Resign?")) {
                triggerAnalysis();
            }
        }

        function checkGameOver() {
            if (game.game_over()) {
                setTimeout(triggerAnalysis, 800);
                return true;
            }
            return false;
        }

        // --- STOCKFISH 18 ANALYSIS ENGINE ---
        let analysisPtr = 0;
        let lastNodeEval = 0.3;

        function triggerAnalysis() {
            document.getElementById('analysis-overlay').style.display = 'flex';
            runAnalysisStep();
        }

        function runAnalysisStep() {
            if (analysisPtr >= moveHistoryFENs.length) {
                renderFinalReport();
                return;
            }
            stockfish.send(`position fen ${moveHistoryFENs[analysisPtr]}`);
            stockfish.send("go depth 14");
        }

        stockfish.onmessage = (e) => {
            if (e.data.includes('score cp')) {
                const match = e.data.match(/score cp (-?\d+)/);
                if (match) {
                    const currentEval = parseInt(match[1]) / 100;
                    const diff = Math.abs(currentEval - lastNodeEval);
                    
                    // Accuracy Classifiers
                    if (diff < 0.12) stats.best++;
                    else if (diff > 2.8) stats.blunder++;
                    else if (diff > 1.1) stats.mistake++;
                    
                    // Brilliant heuristic: High eval sacrifice/move
                    if (diff < 0.06 && Math.abs(currentEval) > 2.2) stats.brilliant++;

                    lastNodeEval = currentEval;
                    analysisPtr++;
                    runAnalysisStep();
                }
            }
        };

        function renderFinalReport() {
            document.getElementById('analysis-status').innerText = "Analysis Completed via Stockfish 18";
            document.getElementById('stats-output').innerHTML = `
                <div class="stat-line"><span class="brilliant">Brilliant Moves</span> <span>${stats.brilliant}</span></div>
                <div class="stat-line"><span class="best">Best Moves</span> <span>${stats.best}</span></div>
                <div class="stat-line"><span class="mistake">Mistakes</span> <span>${stats.mistake}</span></div>
                <div class="stat-line"><span class="blunder">Blunders</span> <span>${stats.blunder}</span></div>
            `;
        }

        // --- SHARING ---
        function copyPGN() {
            navigator.clipboard.writeText(game.pgn());
            alert("PGN Move Record Copied!");
        }

        function shareGame() {
            const pgnSnippet = game.pgn().substring(0, 100);
            const text = encodeURIComponent(`I just finished a match against Rodent III AI! Check out my game analysis: ${pgnSnippet}...`);
            window.open(`https://twitter.com/intent/tweet?text=${text}`);
        }

        function updateUI() {
            const turnName = (game.turn() === 'w') ? "White" : "Black";
            document.getElementById('game-status').innerText = (game.turn() === playerColor) ? `Your Turn (${turnName})` : "Bot Thinking...";
            document.getElementById('pgn-display').innerText = game.pgn() || "New match started. Good luck!";
        }
    </script>
</body>
</html>
