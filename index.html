<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chess vs AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Chessboard CSS -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css">

<style>
body {
  background: #0f172a;
  color: #e2e8f0;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

#board {
  width: 320px;
  margin: 20px auto;
}

.start {
  margin-top: 20px;
}

.controls {
  margin-top: 15px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  background: #38bdf8;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

#status {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>♟ Chess vs Computer</h1>

<div class="start">
  <button onclick="startGame('white')">Play as White</button>
  <button onclick="startGame('black')">Play as Black</button>
</div>

<div id="board"></div>

<div class="controls">
  <button onclick="offerDraw()">Offer Draw</button>
  <button onclick="resign()">Resign</button>
</div>

<p id="status">Choose your side to start</p>

<!-- Libraries (LOAD ONCE ONLY) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

<script>
let board, game;
let playerColor = 'white';
let engineSocket = null;

function startGame(color) {
  playerColor = color;
  game = new Chess();

  if (engineSocket) engineSocket.close();

  engineSocket = new WebSocket("wss://ProtonnDev-engine.hf.space/rodent3-fischer");

  engineSocket.onopen = () => {
    console.log("Engine connected");

    if (playerColor === 'black') {
      makeEngineMove();
    }
  };

  board = Chessboard('board', {
    draggable: true,
    position: 'start',
    orientation: playerColor,
    onDrop: onDrop
  });

  updateStatus();
}

function onDrop(source, target) {
  const move = game.move({
    from: source,
    to: target,
    promotion: 'q'
  });

  if (move === null) return 'snapback';

  updateStatus();
  setTimeout(makeEngineMove, 300);
}

function makeEngineMove() {
  if (game.game_over()) return;

  const fen = game.fen();

  if (engineSocket.readyState === 1) {
    engineSocket.send(fen);
  }

  engineSocket.onmessage = (event) => {
    const move = event.data.trim();

    if (!move || move.length < 4) return;

    game.move({
      from: move.substring(0, 2),
      to: move.substring(2, 4),
      promotion: 'q'
    });

    board.position(game.fen());
    updateStatus();
  };
}

function updateStatus() {
  let status = '';

  if (game.in_checkmate()) {
    status = 'Checkmate!';
    setTimeout(resetGame, 2000);
  } else if (game.in_draw()) {
    status = 'Draw!';
    setTimeout(resetGame, 2000);
  } else {
    status = game.turn() === 'w' ? 'White to move' : 'Black to move';
  }

  document.getElementById('status').innerText = status;
}

function offerDraw() {
  alert("Draw offered (placeholder).");
}

function resign() {
  alert("You resigned.");
  resetGame();
}

function resetGame() {
  game.reset();
  board.start();
  document.getElementById('status').innerText = "Game reset. Choose side.";
}

// ✅ AUTO LOAD BOARD (FOR TESTING)
window.onload = () => startGame('white');
</script>

</body>
</html>
