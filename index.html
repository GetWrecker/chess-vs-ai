<!DOCTYPE html>
<html>
<head>
    <title>Rodent III - One Touch Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #262421; color: #bababa; font-family: sans-serif; text-align: center; }
        #myBoard { margin: 20px auto; width: 450px; border: 5px solid #312e2b; }
        .controls { margin-top: 20px; }
        button { background: #454341; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 4px; }
        .status-box { font-size: 1.2em; margin: 10px; color: #fff; }
        
        /* Highlight for One-Touch Selection */
        .highlight-square { box-shadow: inset 0 0 3px 3px yellow; }

        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #312e2b; padding: 30px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="modal">
            <h3>Select Your Side</h3>
            <button onclick="startGame('w')">White (Goes First)</button>
            <button onclick="startGame('b')">Black</button>
        </div>
    </div>

    <div class="status-box" id="status">Waiting for game start...</div>
    <div id="myBoard"></div>

    <div class="controls">
        <button onclick="offerDraw()">Offer Draw</button>
        <button onclick="resetGame()">New Game</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var playerColor = 'w';
        var sourceSquare = null; // Used for "One-Touch" tracking
        var socket = new WebSocket('wss://ProtonnDev-engine.hf.space/rodent3-fischer');

        socket.onopen = () => { socket.send("uci"); };
        socket.onmessage = (e) => {
            if (e.data.startsWith('bestmove')) {
                const moveStr = e.data.split(' ')[1];
                game.move({ from: moveStr.substring(0, 2), to: moveStr.substring(2, 4), promotion: 'q' });
                board.position(game.fen());
                updateStatus();
            }
        };

        function removeHighlights() { $('#myBoard .square-55d63').removeClass('highlight-square'); }

        // --- THE ONE-TOUCH LOGIC ---
        function onSquareClick(square) {
            // 1. If we haven't picked a piece yet
            if (sourceSquare === null) {
                const piece = game.get(square);
                // Only pick up if it's the player's piece and their turn
                if (piece && piece.color === playerColor && game.turn() === playerColor) {
                    sourceSquare = square;
                    removeHighlights();
                    $(`#myBoard .square-${square}`).addClass('highlight-square');
                }
            } 
            // 2. If we already have a piece selected, try to move to the new square
            else {
                var move = game.move({ from: sourceSquare, to: square, promotion: 'q' });
                
                if (move === null) {
                    // If clicking another of your own pieces, switch selection to that one
                    const piece = game.get(square);
                    if (piece && piece.color === playerColor) {
                        sourceSquare = square;
                        removeHighlights();
                        $(`#myBoard .square-${square}`).addClass('highlight-square');
                    } else {
                        // Clicked an invalid square, deselect
                        sourceSquare = null;
                        removeHighlights();
                    }
                } else {
                    // Valid move made!
                    sourceSquare = null;
                    removeHighlights();
                    board.position(game.fen());
                    updateStatus();
                    window.setTimeout(engineThink, 250);
                }
            }
        }

        function startGame(side) {
            playerColor = side;
            document.getElementById('overlay').style.display = 'none';
            game.reset();
            
            var config = {
                draggable: true, // You can still drag if you prefer
                orientation: (side === 'w' ? 'white' : 'black'),
                position: 'start',
                onDrop: onDrop, // Handles dragging
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            };
            board = Chessboard('myBoard', config);
            
            // Apply click listener to all squares
            $('#myBoard').on('click', '.square-55d63', function() {
                const square = $(this).attr('data-square');
                onSquareClick(square);
            });

            if (playerColor === 'b') engineThink();
            updateStatus();
        }

        // Handle traditional dragging move validation
        function onDrop(source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            removeHighlights();
            sourceSquare = null;
            updateStatus();
            window.setTimeout(engineThink, 250);
        }

        function engineThink() {
            if (game.game_over()) return;
            socket.send(`position fen ${game.fen()}`);
            socket.send("go movetime 1000");
        }

        function updateStatus() {
            let status = "";
            let moveColor = (game.turn() === 'w') ? 'White' : 'Black';

            if (game.in_checkmate()) {
                let winner = (game.turn() === 'w') ? 'Black' : 'White';
                status = `GAME OVER: ${winner} wins!`;
                alert(status);
            } else if (game.in_draw()) {
                status = "GAME OVER: Draw!";
                alert(status);
            } else {
                status = (game.turn() === playerColor) ? "Your turn" : "Engine is thinking...";
                if (game.in_check()) status += " (Check!)";
            }
            document.getElementById('status').innerHTML = status;
        }

        function resetGame() { location.reload(); }
        function offerDraw() { alert("The computer declines. Play on!"); }
    </script>
</body>
</html>
