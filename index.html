<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Chess: Rodent III vs Stockfish Coach</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #161512; --panel: #262421; --accent: #95bb4a; --text: #bababa; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        #myBoard { width: 450px; margin: 10px; border: 4px solid #3c3934; }
        .info-panel { background: var(--panel); padding: 15px; border-radius: 8px; width: 450px; border: 1px solid #3c3934; margin-bottom: 10px; }
        
        /* UI Elements */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 480px; }
        button { background: #3c3934; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #4c4944; }
        .resign { background: #7f1d1d; }
        
        /* PGN & Record Area */
        #pgn-area { background: #111; color: #aaa; padding: 10px; font-family: monospace; font-size: 12px; height: 60px; overflow-y: auto; width: 460px; margin-top: 10px; border-radius: 4px; border: 1px solid #333; }
        
        /* Overlay */
        #setup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .setup-modal { background: var(--panel); padding: 30px; border-radius: 12px; width: 350px; text-align: center; border: 1px solid #444; }
        select { width: 100%; padding: 10px; margin: 10px 0; background: #333; color: white; border: 1px solid #555; }
        
        /* Arrow Hint SVG */
        #arrow-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="setup-modal">
            <h2>Game Setup</h2>
            <label>Choose Side:</label>
            <select id="side-select">
                <option value="w">White</option>
                <option value="b">Black</option>
            </select>
            
            <label>Opponent Strength:</label>
            <select id="level-select">
                <option value="0">Beginner (15% Accuracy)</option>
                <option value="4">Intermediate (60% Accuracy)</option>
                <option value="8">Expert (85% Accuracy)</option>
                <option value="14">Master (94% Accuracy)</option>
                <option value="20">Grandmaster (100% Accuracy)</option>
            </select>

            <label>Stockfish Coach:</label>
            <select id="coach-select">
                <option value="off">Arrows Off</option>
                <option value="on">Best Move Arrows (Stockfish 16)</option>
            </select>

            <button onclick="initGame()" style="background: var(--accent); color: black; width: 100%; margin-top: 15px;">START GAME</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="status" style="color: var(--accent); font-weight: bold;">Select your settings...</div>
        <div id="eval-bar" style="font-size: 0.8em; margin-top: 5px;">Analysis: Neutral</div>
    </div>

    <div style="position: relative;">
        <div id="myBoard"></div>
        <svg id="arrow-container"></svg>
    </div>

    <div id="pgn-area">Move Record (PGN): [Waiting for start]</div>

    <div class="controls">
        <button onclick="copyPGN()">Copy PGN</button>
        <button onclick="shareGame()">Share Game</button>
        <button onclick="offerDraw()">Offer Draw</button>
        <button onclick="handleResign()" class="resign">Resign</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board, game = new Chess();
        var playerColor = 'w', coachEnabled = false, selectedLevel = 7;
        var rodentSocket = new WebSocket('wss://ProtonnDev-engine.hf.space/rodent3-fischer');
        var stockfishSocket = new WebSocket('wss://ProtonnDev-engine.hf.space/stockfish16'); // Hypothetical stockfish endpoint

        // --- 1. INITIALIZATION ---
        function initGame() {
            playerColor = document.getElementById('side-select').value;
            selectedLevel = document.getElementById('level-select').value;
            coachEnabled = document.getElementById('coach-select').value === 'on';
            
            document.getElementById('setup-overlay').style.display = 'none';

            rodentSocket.send("uci");
            rodentSocket.send(`setoption name Skill Level value ${selectedLevel}`);

            board = Chessboard('myBoard', {
                position: 'start',
                orientation: (playerColor === 'w' ? 'white' : 'black'),
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            $('#myBoard').on('click', '.square-55d63', function() {
                handleSquareClick($(this).attr('data-square'));
            });

            if (playerColor === 'b') engineMove();
            if (coachEnabled) getStockfishHint();
            updateStatus();
        }

        // --- 2. MOVEMENT & LOGIC ---
        var sourceSquare = null;
        function handleSquareClick(sq) {
            if (game.turn() !== playerColor) return;
            const piece = game.get(sq);
            
            if (piece && piece.color === playerColor) {
                sourceSquare = sq;
                $('.square-55d63').css('box-shadow', 'none');
                $(`.square-${sq}`).css('box-shadow', 'inset 0 0 3px 3px yellow');
            } else if (sourceSquare) {
                const move = game.move({ from: sourceSquare, to: sq, promotion: 'q' });
                if (move) {
                    sourceSquare = null;
                    $('.square-55d63').css('box-shadow', 'none');
                    board.position(game.fen());
                    clearArrows();
                    updateStatus();
                    setTimeout(engineMove, 400);
                }
            }
        }

        function engineMove() {
            if (game.game_over()) return;
            rodentSocket.send(`position fen ${game.fen()}`);
            rodentSocket.send("go depth 12");
        }

        rodentSocket.onmessage = (e) => {
            if (e.data.startsWith('bestmove')) {
                const move = e.data.split(' ')[1];
                game.move({ from: move.substring(0, 2), to: move.substring(2, 4), promotion: 'q' });
                board.position(game.fen());
                updateStatus();
                if (coachEnabled) getStockfishHint();
            }
        };

        // --- 3. COACHING (STOCKFISH ARROWS) ---
        function getStockfishHint() {
            if (game.game_over()) return;
            stockfishSocket.send(`position fen ${game.fen()}`);
            stockfishSocket.send("go depth 15");
        }

        stockfishSocket.onmessage = (e) => {
            if (e.data.startsWith('bestmove') && coachEnabled && game.turn() === playerColor) {
                const best = e.data.split(' ')[1];
                drawArrow(best.substring(0, 2), best.substring(2, 4));
            }
        };

        // Simple SVG Arrow Logic
        function drawArrow(from, to) {
            clearArrows();
            const svg = document.getElementById('arrow-container');
            // Logic to calculate x,y coordinates based on square names would go here
            // For this widget, we display a text hint for performance
            document.getElementById('eval-bar').innerHTML = `<span style="color:yellow">Coach Suggests: ${from} to ${to}</span>`;
        }

        function clearArrows() { document.getElementById('eval-bar').innerHTML = "Analyzing..."; }

        // --- 4. RECORDING & UTILS ---
        function updateStatus() {
            const pgn = game.pgn();
            document.getElementById('pgn-area').innerText = pgn || "Game started...";
            document.getElementById('status').innerText = game.turn() === playerColor ? "Your Turn" : "Opponent Thinking...";
            if (game.in_checkmate()) alert("Checkmate! PGN: " + pgn);
        }

        function copyPGN() {
            navigator.clipboard.writeText(game.pgn());
            alert("PGN Copied to clipboard!");
        }

        function shareGame() {
            const url = window.location.href + "?pgn=" + encodeURIComponent(game.pgn());
            navigator.clipboard.writeText(url);
            alert("Share link with PGN copied!");
        }

        function handleResign() {
            if (confirm("Confirm Resignation?")) location.reload();
        }

        function offerDraw() {
            alert("The Opponent evaluates the position and refuses to draw!");
        }
    </script>
</body>
</html>
