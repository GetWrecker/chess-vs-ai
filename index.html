<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stockfish 18 Personalities</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #161512; --panel: #262421; --accent: #95bb4a; --text: #bababa; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .board-wrapper { width: 100%; max-width: 450px; aspect-ratio: 1; border: 4px solid #3c3934; }
        #myBoard { width: 100%; height: 100%; }
        .info-panel { background: var(--panel); padding: 15px; border-radius: 8px; width: 100%; max-width: 450px; border: 1px solid #3c3934; margin-bottom: 10px; text-align: center; }
        
        /* Modal UI */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .card { background: var(--panel); padding: 25px; border-radius: 12px; width: 100%; max-width: 350px; border: 1px solid #444; text-align: center; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; font-weight: bold; border: none; }
        select { background: #333; color: white; }
        button { cursor: pointer; transition: 0.2s; }
        
        .stat-line { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; }
        .brilliant { color: #00ebff; } .blunder { color: #ff4d4d; }
    </style>
</head>
<body>

    <div id="setup-overlay" class="overlay">
        <div class="card">
            <h2 style="margin-top:0">Select Opponent</h2>
            <label style="display:block;text-align:left">Choose Personality:</label>
            <select id="personality-select">
                <option value='{"lvl":0, "elo":600, "name":"Monkey (Beginner)"}'>Monkey (Blunders often - 600 Elo)</option>
                <option value='{"lvl":5, "elo":1200, "name":"Scholar (Casual)"}'>Scholar (Plays solid - 1200 Elo)</option>
                <option value='{"lvl":12, "elo":1800, "name":"Coach (Advanced)"}'>Coach (Tactical - 1800 Elo)</option>
                <option value='{"lvl":18, "elo":2400, "name":"Master (Elite)"}'>Master (Pro Level - 2400 Elo)</option>
                <option value='{"lvl":20, "elo":3500, "name":"Stockfish 18 (God)"}'>Stockfish 18 (Unbeatable)</option>
            </select>
            
            <label style="display:block;text-align:left">Your Side:</label>
            <select id="side-select">
                <option value="w">White</option>
                <option value="b">Black</option>
            </select>
            
            <button onclick="initGame()" style="background:var(--accent); color:#111">START GAME</button>
        </div>
    </div>

    <div id="analysis-overlay" class="overlay" style="display:none">
        <div class="card">
            <h2>Match Report</h2>
            <div id="stats-output">Analyzing moves...</div>
            <button onclick="copyPGN()">Copy PGN</button>
            <button onclick="shareTwitter()">Share to Twitter</button>
            <button onclick="location.reload()" style="background:#444; color:white">New Match</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="status" style="color:var(--accent); font-weight:bold; font-size:1.1rem;">VS Stockfish 18</div>
        <div id="move-pgn" style="font-size:0.75rem; color:#888; margin-top:5px; height:40px; overflow:hidden;"></div>
    </div>

    <div class="board-wrapper"><div id="myBoard"></div></div>

    <div style="display:flex; gap:10px; width:450px; margin-top:10px;">
        <button onclick="offerDraw()" style="background:#3c3934; color:white">Offer Draw</button>
        <button onclick="confirmResign()" style="background:#3c3934; color:#ff4d4d">Resign</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board, game = new Chess();
        var stockfish = new WebSocket('wss://ProtonnDev-engine.hf.space/stockfish18');
        var playerSide = 'w', botData = {}, moveHistory = [];
        var currentEval = 0;

        function initGame() {
            botData = JSON.parse(document.getElementById('personality-select').value);
            playerSide = document.getElementById('side-select').value;
            document.getElementById('setup-overlay').style.display = 'none';
            document.getElementById('status').innerText = `Playing vs ${botData.name}`;

            stockfish.send("uci");
            stockfish.send(`setoption name Skill Level value ${botData.lvl}`);
            stockfish.send("setoption name UCI_LimitStrength value true");
            stockfish.send(`setoption name UCI_Elo value ${botData.elo}`);

            board = Chessboard('myBoard', {
                position: 'start',
                orientation: (playerSide === 'w' ? 'white' : 'black'),
                draggable: false,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            $('#myBoard').on('click', '.square-55d63', handleSquareClick);
            if (playerSide === 'b') setTimeout(askEngine, 500);
        }

        var sourceSq = null;
        function handleSquareClick() {
            if (game.turn() !== playerSide || game.game_over()) return;
            const sq = $(this).data('square');
            const piece = game.get(sq);

            if (piece && piece.color === playerSide) {
                sourceSq = sq;
                $('.square-55d63').css('box-shadow', 'none');
                $(this).css('box-shadow', 'inset 0 0 5px 5px #95bb4a');
            } else if (sourceSq) {
                const move = game.move({ from: sourceSq, to: sq, promotion: 'q' });
                if (move) {
                    sourceSq = null;
                    $('.square-55d63').css('box-shadow', 'none');
                    moveHistory.push(game.fen());
                    board.position(game.fen());
                    updateUI();
                    if (!checkEnd()) setTimeout(askEngine, 400);
                }
            }
        }

        function askEngine() {
            stockfish.send(`position fen ${game.fen()}`);
            stockfish.send("go depth 12");
        }

        stockfish.onmessage = (e) => {
            if (e.data.includes('score cp')) {
                const match = e.data.match(/score cp (-?\d+)/);
                if (match) currentEval = parseInt(match[1]);
            }
            if (e.data.startsWith('bestmove')) {
                const best = e.data.split(' ')[1];
                if (best !== '(none)') {
                    game.move({ from: best.substring(0, 2), to: best.substring(2, 4), promotion: 'q' });
                    moveHistory.push(game.fen());
                    board.position(game.fen());
                    updateUI();
                    checkEnd();
                }
            }
        };

        function offerDraw() {
            const relEval = (game.turn() === 'b' ? currentEval : -currentEval);
            if (relEval > 100) alert("Stockfish declines: 'I'm winning!'");
            else { alert("Accepted. Draw agreed."); triggerReview(); }
        }

        function confirmResign() {
            if (confirm("Are you sure you want to Resign?")) triggerReview();
        }

        function checkEnd() {
            if (game.game_over()) { setTimeout(triggerReview, 500); return true; }
            return false;
        }

        // --- ANALYSIS SYSTEM ---
        let reviewIdx = 0, lastScore = 0.3, stats = { brilliant:0, best:0, mistake:0, blunder:0 };

        function triggerReview() {
            document.getElementById('analysis-overlay').style.display = 'flex';
            runAnalysis();
        }

        function runAnalysis() {
            if (reviewIdx >= moveHistory.length) { renderStats(); return; }
            stockfish.send(`position fen ${moveHistory[reviewIdx]}`);
            stockfish.send("go depth 14");
        }

        // Re-using the websocket for analysis requires a different handler or temporary logic
        const originalHandler = stockfish.onmessage;
        stockfish.onmessage = (e) => {
            if (e.data.includes('score cp')) {
                const score = parseInt(e.data.match(/score cp (-?\d+)/)[1]) / 100;
                const diff = Math.abs(score - lastScore);
                if (diff < 0.1) stats.best++;
                else if (diff > 2.5) stats.blunder++;
                else if (diff > 1.0) stats.mistake++;
                if (diff < 0.05 && Math.abs(score) > 2.0) stats.brilliant++;
                lastScore = score; reviewIdx++; runAnalysis();
            } else if (e.data.startsWith('bestmove') && reviewIdx < moveHistory.length) {
                // Ignore bestmove strings during analysis phase
            } else {
                originalHandler(e);
            }
        };

        function renderStats() {
            document.getElementById('stats-output').innerHTML = `
                <div class="stat-line"><span class="brilliant">Brilliant</span> <span>${stats.brilliant}</span></div>
                <div class="stat-line"><span>Best</span> <span>${stats.best}</span></div>
                <div class="stat-line"><span>Mistake</span> <span>${stats.mistake}</span></div>
                <div class="stat-line"><span class="blunder">Blunder</span> <span>${stats.blunder}</span></div>
            `;
        }

        function copyPGN() { navigator.clipboard.writeText(game.pgn()); alert("Copied!"); }
        function shareTwitter() { window.open(`https://twitter.com/intent/tweet?text=I played Stockfish 18! PGN: ${game.pgn().substring(0,50)}...`); }
        function updateUI() { document.getElementById('move-pgn').innerText = game.pgn(); }
    </script>
</body>
</html>
