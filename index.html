<!DOCTYPE html>
<html>
<head>
    <title>Rodent III - Tactical Human AI</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #161512; --panel: #262421; --accent: #95bb4a; --text: #bababa; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; margin: 0; padding: 20px; }
        #myBoard { margin: 10px auto; width: 450px; border: 4px solid #3c3934; border-radius: 4px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .info-panel { background: var(--panel); padding: 15px; border-radius: 8px; display: inline-block; margin-bottom: 15px; min-width: 420px; border: 1px solid #3c3934; }
        .status { font-weight: bold; color: var(--accent); font-size: 1.1em; margin-bottom: 5px; }
        .engine-msg { font-size: 0.85em; color: #8a8a8a; font-family: monospace; }
        button { background: #3c3934; color: #bababa; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #4c4944; color: #fff; }
        .highlight-selected { background-color: rgba(149, 187, 74, 0.5) !important; }

        /* Overlays */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--panel); padding: 30px; border-radius: 12px; border: 1px solid #3c3934; width: 380px; }
        
        /* Stats Styles */
        .stat-line { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; }
        .brilliant { color: #00ebff; font-weight: bold; }
        .blunder { color: #ef4444; font-weight: bold; }
        .share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-share { font-size: 0.8em; padding: 8px; }
    </style>
</head>
<body>

    <div id="setup-overlay" class="overlay">
        <div class="modal">
            <h2 style="color:#fff; margin-top:0;">New Match</h2>
            <p>Select Difficulty & Side</p>
            <select id="level-select" style="width:100%; padding:10px; margin-bottom:15px; background:#333; color:white; border:1px solid #444;">
                <option value="1000">Beginner (1000 Elo)</option>
                <option value="1500" selected>Club Player (1500 Elo)</option>
                <option value="2000">Expert (2000 Elo)</option>
                <option value="2600">Grandmaster (2600 Elo)</option>
            </select>
            <div style="display:flex; gap:10px;">
                <button onclick="startGame('w')" style="flex:1; background:var(--accent); color:#111;">Play as White</button>
                <button onclick="startGame('b')" style="flex:1; background:white; color:#111;">Play as Black</button>
            </div>
        </div>
    </div>

    <div id="analysis-overlay" class="overlay" style="display:none;">
        <div class="modal">
            <h2 id="result-title" style="color:#fff; margin-top:0;">Match Review</h2>
            <div id="stats-output">Analyzing moves with Stockfish 18...</div>
            
            <button onclick="copyPGN()" style="width:100%; margin-top:15px;">Copy PGN</button>
            
            <div class="share-grid">
                <button class="btn-share" onclick="share('fb')" style="background:#3b5998; color:white;">Facebook</button>
                <button class="btn-share" onclick="share('tw')" style="background:#000000; color:white;">X (Twitter)</button>
                <button class="btn-share" onclick="share('wa')" style="background:#25D366; color:white;">WhatsApp</button>
                <button class="btn-share" onclick="share('ms')" style="background:#0084FF; color:white;">Messenger</button>
            </div>

            <button onclick="location.reload()" style="width:100%; margin-top:15px; background:var(--accent); color:#111;">NEW GAME</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="status" class="status">Connecting...</div>
        <div id="engine-info" class="engine-msg">Initializing UCI Parameters...</div>
    </div>

    <div id="myBoard"></div>

    <div style="margin-top:15px;">
        <button onclick="offerDraw()" style="color: #95bb4a;">Offer Draw</button>
        <button onclick="handleResign()" style="color: #ef4444;">Resign</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null, game = new Chess();
        var playerColor = 'w', selectedSquare = null;
        var engineEval = 0, moveHistoryFENs = [];
        var rodent = new WebSocket('wss://ProtonnDev-engine.hf.space/rodent3-fischer');
        var stockfish = new WebSocket('wss://ProtonnDev-engine.hf.space/stockfish18');

        // --- 1. ENGINE HANDLERS ---
        rodent.onopen = () => { 
            document.getElementById('status').innerText = "Ready to Play";
        };

        rodent.onmessage = (e) => {
            const msg = e.data;
            if (msg.includes('score cp')) {
                const parts = msg.split(' ');
                engineEval = parseInt(parts[parts.indexOf('cp') + 1]);
            }
            if (msg.startsWith('bestmove')) {
                const moveStr = msg.split(' ')[1];
                if (moveStr !== '(none)') {
                    game.move({ from: moveStr.substring(0, 2), to: moveStr.substring(2, 4), promotion: 'q' });
                    moveHistoryFENs.push(game.fen());
                    board.position(game.fen());
                    updateStatus();
                }
            }
        };

        // --- 2. GAMEPLAY ---
        function startGame(side) {
            const elo = document.getElementById('level-select').value;
            playerColor = side;
            document.getElementById('setup-overlay').style.display = 'none';
            
            rodent.send("uci");
            rodent.send("setoption name UCI_LimitStrength value true");
            rodent.send(`setoption name UCI_Elo value ${elo}`);
            rodent.send("isready");
            rodent.send("ucinewgame");

            board = Chessboard('myBoard', {
                position: 'start',
                orientation: (side === 'w' ? 'white' : 'black'),
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            $('#myBoard').on('click', '.square-55d63', function() {
                handleSquareClick($(this).attr('data-square'));
            });

            if (playerColor === 'b') setTimeout(engineThink, 500);
            updateStatus();
        }

        function handleSquareClick(square) {
            if (game.turn() !== playerColor || game.game_over()) return;
            const piece = game.get(square);
            if (piece && piece.color === playerColor) {
                removeHighlights();
                selectedSquare = square;
                $(`#myBoard .square-${square}`).addClass('highlight-selected');
            } else if (selectedSquare) {
                const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                if (move) {
                    removeHighlights();
                    selectedSquare = null;
                    moveHistoryFENs.push(game.fen());
                    board.position(game.fen());
                    updateStatus();
                    if (!checkEnd()) window.setTimeout(engineThink, 400);
                } else {
                    selectedSquare = null;
                    removeHighlights();
                }
            }
        }

        function engineThink() {
            rodent.send(`position fen ${game.fen()}`);
            rodent.send("go depth 12"); 
        }

        function checkEnd() {
            if (game.game_over()) {
                setTimeout(runAnalysis, 600);
                return true;
            }
            return false;
        }

        // --- 3. ANALYSIS (STOCKFISH 18) ---
        let aIdx = 0, lastS = 0.3, stats = { brilliant:0, best:0, mistake:0, blunder:0 };
        function runAnalysis() {
            document.getElementById('analysis-overlay').style.display = 'flex';
            stockfish.send("uci");
            processNextMove();
        }

        function processNextMove() {
            if (aIdx >= moveHistoryFENs.length) { displayStats(); return; }
            stockfish.send(`position fen ${moveHistoryFENs[aIdx]}`);
            stockfish.send("go depth 14");
        }

        stockfish.onmessage = (e) => {
            if (e.data.includes('score cp')) {
                const s = parseInt(e.data.match(/score cp (-?\d+)/)[1]) / 100;
                const d = Math.abs(s - lastS);
                if (d < 0.12) stats.best++;
                else if (d > 2.8) stats.blunder++;
                else if (d > 1.1) stats.mistake++;
                if (d < 0.06 && Math.abs(s) > 2.0) stats.brilliant++;
                lastS = s; aIdx++; processNextMove();
            }
        };

        function displayStats() {
            document.getElementById('stats-output').innerHTML = `
                <div class="stat-line"><span class="brilliant">Brilliant</span> <span>${stats.brilliant}</span></div>
                <div class="stat-line"><span>Best Moves</span> <span>${stats.best}</span></div>
                <div class="stat-line"><span>Mistakes</span> <span>${stats.mistake}</span></div>
                <div class="stat-line"><span class="blunder">Blunders</span> <span>${stats.blunder}</span></div>
            `;
        }

        // --- 4. UTILS & SOCIAL ---
        function copyPGN() { navigator.clipboard.writeText(game.pgn()); alert("PGN Copied!"); }

        function share(platform) {
            const msg = encodeURIComponent(`I played Rodent III! Analysis: ${stats.best} Best moves. PGN: ${game.pgn().substring(0, 100)}...`);
            const url = encodeURIComponent(window.location.href);
            let link = "";
            switch(platform) {
                case 'fb': link = `https://www.facebook.com/sharer/sharer.php?u=${url}`; break;
                case 'tw': link = `https://twitter.com/intent/tweet?text=${msg}`; break;
                case 'wa': link = `https://api.whatsapp.com/send?text=${msg}`; break;
                case 'ms': link = `fb-messenger://share?link=${url}`; break;
            }
            window.open(link, '_blank');
        }

        function offerDraw() {
            const rel = (game.turn() === 'b') ? engineEval : -engineEval;
            if (rel > 150) alert("Computer declines.");
            else { alert("Draw accepted."); runAnalysis(); }
        }

        function handleResign() { if (confirm("Resign?")) runAnalysis(); }
        function updateStatus() {
            document.getElementById('status').innerText = game.turn() === playerColor ? "Your Turn" : "Thinking...";
        }
        function removeHighlights() { $('#myBoard .square-55d63').removeClass('highlight-selected'); }
    </script>
</body>
</html>
