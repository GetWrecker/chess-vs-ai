<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chess vs AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: #0f172a;
  color: white;
  text-align: center;
  font-family: Arial;
}

#board {
  width: 320px;
  margin: 20px auto;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
}

.square {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.light { background: #f0d9b5; }
.dark { background: #b58863; }

button {
  padding: 10px;
  margin: 5px;
}
</style>
</head>

<body>

<h2>♟ Chess vs AI</h2>

<button onclick="startGame()">Start Game</button>

<div id="board"></div>

<script>
const pieces = {
  r:"♜", n:"♞", b:"♝", q:"♛", k:"♚", p:"♟",
  R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔", P:"♙"
};

let boardState = [
["r","n","b","q","k","b","n","r"],
["p","p","p","p","p","p","p","p"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["P","P","P","P","P","P","P","P"],
["R","N","B","Q","K","B","N","R"]
];

function drawBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const square = document.createElement("div");
      square.className = "square " + ((r+c)%2 ? "dark" : "light");

      const piece = boardState[r][c];
      if (piece) square.textContent = pieces[piece];

      board.appendChild(square);
    }
  }
}

function startGame() {
  drawBoard();
}
</script>

</body>
</html>
