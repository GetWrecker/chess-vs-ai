<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Chess: Rodent III vs Stockfish 18</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #161512; --panel: #262421; --accent: #95bb4a; --text: #bababa; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .board-wrapper { width: 450px; height: 450px; margin: 10px; border: 4px solid #3c3934; }
        #myBoard { width: 100%; height: 100%; }
        .info-panel { background: var(--panel); padding: 15px; border-radius: 8px; width: 450px; border: 1px solid #3c3934; margin-bottom: 10px; text-align: center; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 480px; }
        button { background: #3c3934; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #4c4944; }
        #pgn-display { background: #111; color: #777; padding: 10px; font-family: monospace; font-size: 11px; height: 50px; overflow-y: auto; width: 460px; margin-top: 10px; border: 1px solid #333; }
        
        /* Modals */
        .full-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .modal-card { background: var(--panel); padding: 30px; border-radius: 12px; width: 350px; text-align: center; border: 1px solid #444; }
        select { width: 100%; padding: 10px; margin: 10px 0; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
        
        /* Stats Styles */
        .stat-line { display: flex; justify-content: space-between; margin: 10px 0; padding: 5px; border-bottom: 1px solid #333; }
        .brilliant { color: #00ebff; font-weight: bold; }
        .best { color: #95bb4a; font-weight: bold; }
        .mistake { color: #ffcc00; font-weight: bold; }
        .blunder { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

    <div id="setup-overlay" class="full-overlay">
        <div class="modal-card">
            <h2>Game Setup</h2>
            <label>Choose Side:</label>
            <select id="side-select">
                <option value="w">White (Moves First)</option>
                <option value="b">Black</option>
            </select>
            <label>Bot Level:</label>
            <select id="level-select">
                <option value="0">Beginner (Level 0)</option>
                <option value="5">Intermediate (Level 5)</option>
                <option value="12">Expert (Level 12)</option>
                <option value="18">Master (Level 18)</option>
                <option value="20">Grandmaster (Level 20)</option>
            </select>
            <button onclick="startGame()" style="background: var(--accent); color: black; width: 100%; margin-top: 15px;">START GAME</button>
        </div>
    </div>

    <div id="analysis-overlay" class="full-overlay" style="display: none;">
        <div class="modal-card">
            <h2>Game Review</h2>
            <div id="analysis-status">Running Stockfish 18 Analysis...</div>
            <div id="stats-output" style="margin: 20px 0;"></div>
            <button onclick="copyPGN()" style="width: 100%; margin-bottom: 8px;">Copy PGN</button>
            <button onclick="shareGame()" style="width: 100%; background: #1da1f2; margin-bottom: 8px;">Share on Social Media</button>
            <button onclick="location.reload()" style="width: 100%; background: none; border: 1px solid #555;">New Game</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="game-status" style="color: var(--accent); font-weight: bold;">Select Settings...</div>
        <div id="move-info" style="font-size: 0.8em; margin-top: 5px;">Ready to play</div>
    </div>

    <div class="board-wrapper">
        <div id="myBoard"></div>
    </div>

    <div id="pgn-display">PGN Record: [Empty]</div>

    <div class="controls">
        <button onclick="offerDraw()">Offer Draw</button>
        <button onclick="handleResign()" style="color: #ef4444;">Resign</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board, game = new Chess();
        var playerColor = 'w', botLevel = 7;
        var rodent = new WebSocket('wss://ProtonnDev-engine.hf.space/rodent3-fischer');
        var stockfish = new WebSocket('wss://ProtonnDev-engine.hf.space/stockfish18');
        var moveHistoryFENs = [];
        var engineEval = 0;
        var stats = { brilliant: 0, best: 0, mistake: 0, blunder: 0 };

        // --- CORE LOGIC ---
        function startGame() {
            playerColor = document.getElementById('side-select').value;
            botLevel = document.getElementById('level-select').value;
            document.getElementById('setup-overlay').style.display = 'none';

            rodent.send("uci");
            rodent.send(`setoption name Skill Level value ${botLevel}`);
            stockfish.send("uci");

            board = Chessboard('myBoard', {
                position: 'start',
                orientation: (playerColor === 'w' ? 'white' : 'black'),
                draggable: false,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            $('#myBoard').on('click', '.square-55d63', onSquareClick);
            
            if (playerColor === 'b') setTimeout(botMove, 500);
            updateUI();
        }

        var sourceSquare = null;
        function onSquareClick() {
            if (game.turn() !== playerColor || game.game_over()) return;
            const square = $(this).data('square');
            const piece = game.get(square);

            if (piece && piece.color === playerColor) {
                sourceSquare = square;
                $('.square-55d63').css('box-shadow', 'none');
                $(this).css('box-shadow', 'inset 0 0 3px 3px yellow');
            } else if (sourceSquare) {
                const move = game.move({ from: sourceSquare, to: square, promotion: 'q' });
                if (move) {
                    sourceSquare = null;
                    $('.square-55d63').css('box-shadow', 'none');
                    moveHistoryFENs.push(game.fen());
                    board.position(game.fen());
                    updateUI();
                    if (!checkEnd()) setTimeout(botMove, 400);
                }
            }
        }

        function botMove() {
            if (game.game_over()) return;
            rodent.send(`position fen ${game.fen()}`);
            rodent.send("go depth 12");
        }

        rodent.onmessage = (e) => {
            if (e.data.includes('score cp')) {
                const match = e.data.match(/score cp (-?\d+)/);
                if (match) engineEval = parseInt(match[1]);
            }
            if (e.data.startsWith('bestmove')) {
                const moveStr = e.data.split(' ')[1];
                if (moveStr !== '(none)') {
                    game.move({ from: moveStr.substring(0, 2), to: moveStr.substring(2, 4), promotion: 'q' });
                    moveHistoryFENs.push(game.fen());
                    board.position(game.fen());
                    updateUI();
                    checkEnd();
                }
            }
        };

        // --- BUTTON ACTIONS ---
        function offerDraw() {
            // Evaluates based on whose turn it is
            const relativeEval = (game.turn() === 'b') ? engineEval : -engineEval;
            if (relativeEval > 150) {
                alert("Rodent III declines: 'My position is too strong!'");
            } else {
                alert("Rodent III accepts: 'The game is balanced.'");
                triggerAnalysis();
            }
        }

        function handleResign() {
            if (confirm("Are you sure you want to Resign?")) {
                triggerAnalysis();
            }
        }

        function checkEnd() {
            if (game.game_over()) {
                setTimeout(triggerAnalysis, 500);
                return true;
            }
            return false;
        }

        // --- POST-GAME ANALYSIS (STOCKFISH 18) ---
        let analysisIndex = 0;
        let prevEval = 0.3;

        function triggerAnalysis() {
            document.getElementById('analysis-overlay').style.display = 'flex';
            runStep();
        }

        function runStep() {
            if (analysisIndex >= moveHistoryFENs.length) {
                displayStats();
                return;
            }
            stockfish.send(`position fen ${moveHistoryFENs[analysisIndex]}`);
            stockfish.send("go depth 14");
        }

        stockfish.onmessage = (e) => {
            if (e.data.includes('score cp')) {
                const match = e.data.match(/score cp (-?\d+)/);
                if (match) {
                    const currentEval = parseInt(match[1]) / 100;
                    const diff = Math.abs(currentEval - prevEval);
                    
                    if (diff < 0.1) stats.best++;
                    else if (diff > 3.0) stats.blunder++;
                    else if (diff > 1.2) stats.mistake++;
                    if (diff < 0.05 && Math.abs(currentEval) > 2.0) stats.brilliant++;

                    prevEval = currentEval;
                    analysisIndex++;
                    runStep();
                }
            }
        };

        function displayStats() {
            document.getElementById('analysis-status').innerText = "Analysis Complete";
            document.getElementById('stats-output').innerHTML = `
                <div class="stat-line"><span class="brilliant">Brilliant</span> <span>${stats.brilliant}</span></div>
                <div class="stat-line"><span class="best">Best Moves</span> <span>${stats.best}</span></div>
                <div class="stat-line"><span class="mistake">Mistakes</span> <span>${stats.mistake}</span></div>
                <div class="stat-line"><span class="blunder">Blunders</span> <span>${stats.blunder}</span></div>
            `;
        }

        // --- SOCIAL & SHARING ---
        function copyPGN() {
            navigator.clipboard.writeText(game.pgn());
            alert("PGN Copied!");
        }

        function shareGame() {
            const text = encodeURIComponent(`I played Chess vs Rodent III! PGN: ${game.pgn()}`);
            window.open(`https://twitter.com/intent/tweet?text=${text}`);
        }

        function updateUI() {
            document.getElementById('game-status').innerText = (game.turn() === playerColor) ? "Your Turn" : "Bot Thinking...";
            document.getElementById('pgn-display').innerText = game.pgn() || "No moves yet.";
        }
    </script>
</body>
</html>
