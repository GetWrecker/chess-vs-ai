<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stockfish 18 Pro - JSON API Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #161512; --panel: #262421; --accent: #95bb4a; --text: #bababa; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .board-wrapper { width: 100%; max-width: 450px; aspect-ratio: 1; border: 4px solid #3c3934; position: relative; }
        #myBoard { width: 100%; height: 100%; }
        .info-panel { background: var(--panel); padding: 15px; border-radius: 8px; width: 100%; max-width: 450px; border: 1px solid #3c3934; margin-bottom: 10px; text-align: center; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .card { background: var(--panel); padding: 25px; border-radius: 12px; width: 100%; max-width: 350px; border: 1px solid #444; text-align: center; }
        
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; font-weight: bold; border: none; font-size: 1rem; }
        select { background: #333; color: white; cursor: pointer; }
        button { cursor: pointer; transition: 0.2s; background: #3c3934; color: white; }
        button:hover { background: #4c4944; }
        .btn-accent { background: var(--accent); color: #111; }
        
        #pgn-log { background: #111; color: #777; padding: 10px; font-family: monospace; font-size: 11px; height: 50px; overflow-y: auto; width: 100%; max-width: 460px; margin-top: 10px; border: 1px solid #333; }
        .stat-line { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 1.1rem; }
        .brilliant { color: #00ebff; } .blunder { color: #ff4d4d; }
    </style>
</head>
<body>

    <div id="setup-overlay" class="overlay">
        <div class="card">
            <h2 style="margin:0 0 20px">Game Setup</h2>
            <label style="display:block;text-align:left">Opponent Personality:</label>
            <select id="elo-select">
                <option value="400">Baby Monkey (400 Elo)</option>
                <option value="1000">Casual Player (1000 Elo)</option>
                <option value="1600" selected>Club Player (1600 Elo)</option>
                <option value="2200">National Master (2200 Elo)</option>
                <option value="3000">Grandmaster (3000 Elo)</option>
            </select>
            
            <label style="display:block;text-align:left">Your Color:</label>
            <select id="side-select">
                <option value="white">White</option>
                <option value="black">Black</option>
            </select>
            
            <button onclick="startGame()" class="btn-accent">START MATCH</button>
        </div>
    </div>

    <div id="analysis-overlay" class="overlay" style="display:none">
        <div class="card">
            <h2>Match Analysis</h2>
            <div id="analysis-status">Stockfish 18 is reviewing...</div>
            <div id="stats-output" style="margin: 20px 0;"></div>
            <button onclick="copyPGN()">Copy PGN</button>
            <button onclick="shareTwitter()">Share to Social Media</button>
            <button onclick="location.reload()" style="background:#444">New Game</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="status" style="color:var(--accent); font-weight:bold; font-size:1.2rem;">Ready</div>
        <div id="eval-text" style="font-size:0.8rem; color:#888;">Waiting for first move...</div>
    </div>

    <div class="board-wrapper"><div id="myBoard"></div></div>

    <div id="pgn-log">PGN: [No moves]</div>

    <div style="display:flex; gap:10px; width:100%; max-width:450px; margin-top:10px;">
        <button onclick="offerDraw()">Offer Draw</button>
        <button onclick="confirmResign()" style="color:#ff4d4d">Resign</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board, game = new Chess();
        var socket = new WebSocket('wss://chess-api.com/v1');
        var playerSide = 'white', botElo = 1600;
        var moveHistory = []; 
        var lastEval = 0;

        // --- CORE GAME START ---
        function startGame() {
            playerSide = document.getElementById('side-select').value;
            botElo = parseInt(document.getElementById('elo-select').value);
            document.getElementById('setup-overlay').style.display = 'none';

            board = Chessboard('myBoard', {
                position: 'start',
                orientation: playerSide,
                draggable: false,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            $('#myBoard').on('click', '.square-55d63', handleSquareClick);
            
            if (playerSide === 'black') {
                setTimeout(fetchBotMove, 500);
            }
            updateStatus();
        }

        var sourceSq = null;
        function handleSquareClick() {
            const turn = game.turn() === 'w' ? 'white' : 'black';
            if (turn !== playerSide || game.game_over()) return;

            const sq = $(this).data('square');
            const piece = game.get(sq);

            if (piece && piece.color === (playerSide === 'white' ? 'w' : 'b')) {
                sourceSq = sq;
                $('.square-55d63').css('box-shadow', 'none');
                $(this).css('box-shadow', 'inset 0 0 5px 5px #95bb4a');
            } else if (sourceSq) {
                const move = game.move({ from: sourceSq, to: sq, promotion: 'q' });
                if (move) {
                    sourceSq = null;
                    $('.square-55d63').css('box-shadow', 'none');
                    board.position(game.fen());
                    moveHistory.push(game.fen());
                    updateStatus();
                    if (!checkEnd()) setTimeout(fetchBotMove, 400);
                }
            }
        }

        // --- COMMUNICATION LAYER ---
        function fetchBotMove() {
            const payload = {
                fen: game.fen(),
                level: 3, // Depth
                elo: botElo
            };
            socket.send(JSON.stringify(payload));
        }

        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.move) {
                game.move(data.move);
                board.position(game.fen());
                moveHistory.push(game.fen());
                lastEval = data.eval || 0;
                updateStatus();
                checkEnd();
            }
        };

        // --- BUTTON LOGIC ---
        function offerDraw() {
            // Engine eval is from white's perspective usually
            const relEval = playerSide === 'white' ? -lastEval : lastEval;
            if (relEval > 1.0) alert("Computer declines: 'I am winning!'");
            else { alert("Draw Accepted."); triggerAnalysis(); }
        }

        function confirmResign() {
            if (confirm("Are you sure you want to resign?")) triggerAnalysis();
        }

        function checkEnd() {
            if (game.game_over()) { setTimeout(triggerAnalysis, 600); return true; }
            return false;
        }

        // --- STOCKFISH 18 ANALYSIS ---
        let reviewIdx = 0, analysisStats = { brilliant: 0, best: 0, mistake: 0, blunder: 0 };
        let prevScore = 0.3;

        function triggerAnalysis() {
            document.getElementById('analysis-overlay').style.display = 'flex';
            runAnalysis();
        }

        function runAnalysis() {
            if (reviewIdx >= moveHistory.length) {
                showFinalReport();
                return;
            }
            // Using the same socket for analysis at Max Elo
            socket.send(JSON.stringify({ fen: moveHistory[reviewIdx], elo: 3200, level: 4 }));
        }

        // Redirect socket for analysis phase
        const gameHandler = socket.onmessage;
        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (document.getElementById('analysis-overlay').style.display === 'flex') {
                const score = data.eval || 0;
                const diff = Math.abs(score - prevScore);
                
                if (diff < 0.15) analysisStats.best++;
                else if (diff > 2.5) analysisStats.blunder++;
                else if (diff > 1.0) analysisStats.mistake++;
                if (diff < 0.08 && Math.abs(score) > 2.0) analysisStats.brilliant++;
                
                prevScore = score;
                reviewIdx++;
                runAnalysis();
            } else {
                gameHandler(e);
            }
        };

        function showFinalReport() {
            document.getElementById('analysis-status').innerText = "Analysis Complete (Stockfish 18)";
            document.getElementById('stats-output').innerHTML = `
                <div class="stat-line"><span class="brilliant">Brilliant</span> <span>${analysisStats.brilliant}</span></div>
                <div class="stat-line"><span>Best Moves</span> <span>${analysisStats.best}</span></div>
                <div class="stat-line"><span>Mistakes</span> <span>${analysisStats.mistake}</span></div>
                <div class="stat-line"><span class="blunder">Blunder</span> <span>${analysisStats.blunder}</span></div>
            `;
        }

        // --- UTILS ---
        function copyPGN() { navigator.clipboard.writeText(game.pgn()); alert("PGN Copied!"); }
        function shareTwitter() { 
            const text = encodeURIComponent(`I played Stockfish 18! Analysis: ${analysisStats.best} Best Moves. PGN: ${game.pgn().substring(0, 50)}...`);
            window.open(`https://twitter.com/intent/tweet?text=${text}`); 
        }
        function updateStatus() {
            const turn = game.turn() === 'w' ? 'White' : 'Black';
            document.getElementById('status').innerText = game.game_over() ? "Game Over" : `${turn}'s Turn`;
            document.getElementById('pgn-log').innerText = game.pgn() || "New Game";
            document.getElementById('eval-text').innerText = `Evaluation: ${lastEval > 0 ? '+' : ''}${lastEval}`;
        }
    </script>
</body>
</html>
