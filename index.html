<!DOCTYPE html>
<html>
<head>
    <title>Rodent III - Tactical Human AI</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #161512; color: #bababa; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; margin: 0; padding: 20px; }
        #myBoard { margin: 10px auto; width: 450px; border: 4px solid #3c3934; border-radius: 4px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .info-panel { background: #262421; padding: 15px; border-radius: 8px; display: inline-block; margin-bottom: 15px; min-width: 420px; border: 1px solid #3c3934; }
        .status { font-weight: bold; color: #95bb4a; font-size: 1.1em; margin-bottom: 5px; }
        .engine-msg { font-size: 0.85em; color: #8a8a8a; font-family: monospace; }
        button { background: #3c3934; color: #bababa; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #4c4944; color: #fff; }
        .highlight-selected { background-color: rgba(255, 255, 0, 0.5) !important; }

        #overlay, #game-over-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: #262421; padding: 40px; border-radius: 12px; border: 1px solid #3c3934; max-width: 400px; }
        
        .share-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-new { background: #95bb4a; color: #161512; width: 100%; margin-top: 20px; font-size: 1.1em; }
        .btn-fb { background: #3b5998; color: white; }
        .btn-x { background: #000000; color: white; }
        .btn-wa { background: #25d366; color: white; }
        .btn-ms { background: #0084ff; color: white; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="modal">
            <h2 style="color:#fff">New Match</h2>
            <p>Select your side to begin against Rodent III</p>
            <button onclick="startGame('w')">White</button>
            <button onclick="startGame('b')">Black</button>
        </div>
    </div>

    <div id="game-over-overlay" style="display:none;">
        <div class="modal">
            <h2 id="end-title" style="color:#fff">Game Over</h2>
            <p id="end-reason">Match Finished</p>
            
            <button onclick="copyPGN()" style="width:100%">Copy PGN Record</button>
            
            <div class="share-box">
                <button class="btn-fb" onclick="share('fb')">Facebook</button>
                <button class="btn-x" onclick="share('x')">X (Twitter)</button>
                <button class="btn-wa" onclick="share('wa')">WhatsApp</button>
                <button class="btn-ms" onclick="share('ms')">Messenger</button>
            </div>

            <button class="btn-new" onclick="location.reload()">New Game</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="status" class="status">Connecting...</div>
        <div id="engine-info" class="engine-msg">Initializing UCI Parameters...</div>
    </div>

    <div id="myBoard"></div>

    <div style="margin-top:15px;">
        <button onclick="offerDraw()" style="color: #95bb4a;">Offer Draw</button>
        <button onclick="handleResign()" style="color: #ef4444;">Resign</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var playerColor = 'w';
        var selectedSquare = null;
        var engineEval = 0;
        var socket = new WebSocket('wss://ProtonnDev-engine.hf.space/rodent3-fischer');

        socket.onopen = () => { 
            socket.send("uci");
            socket.send("setoption name Skill Level value 7");
            document.getElementById('status').innerText = "Ready to Start";
        };

        socket.onmessage = (e) => {
            const msg = e.data;
            if (msg.includes('score cp')) {
                const parts = msg.split(' ');
                const cpIndex = parts.indexOf('cp');
                engineEval = parseInt(parts[cpIndex + 1]);
            }
            if (msg.startsWith('bestmove')) {
                const moveStr = msg.split(' ')[1];
                if (moveStr && moveStr !== '(none)') {
                    game.move({ from: moveStr.substring(0, 2), to: moveStr.substring(2, 4), promotion: 'q' });
                    board.position(game.fen());
                    updateStatus();
                }
            }
        };

        function handleSquareClick(square) {
            if (game.turn() !== playerColor || game.game_over()) return;
            const piece = game.get(square);
            if (piece && piece.color === playerColor) {
                removeHighlights();
                selectedSquare = square;
                $(`#myBoard .square-${square}`).addClass('highlight-selected');
            } else if (selectedSquare) {
                const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                if (move) {
                    removeHighlights();
                    selectedSquare = null;
                    board.position(game.fen());
                    updateStatus();
                    window.setTimeout(engineThink, 300);
                } else {
                    selectedSquare = null;
                    removeHighlights();
                }
            }
        }

        function engineThink() {
            if (game.game_over()) return;
            socket.send(`position fen ${game.fen()}`);
            socket.send("go depth 10"); 
        }

        function showEndScreen(reason) {
            document.getElementById('end-reason').innerText = reason;
            document.getElementById('game-over-overlay').style.display = 'flex';
        }

        function handleResign() {
            if (confirm("Are you sure you want to Resign?")) {
                showEndScreen("You resigned the match.");
            }
        }

        function offerDraw() {
            const threshold = (game.turn() === 'b') ? engineEval : -engineEval;
            if (threshold > 150) {
                alert("Computer declines the draw: 'I have a clear advantage!'");
            } else {
                showEndScreen("Draw accepted by Rodent III.");
            }
        }

        function startGame(side) {
            playerColor = side;
            document.getElementById('overlay').style.display = 'none';
            board = Chessboard('myBoard', {
                position: 'start',
                orientation: (side === 'w' ? 'white' : 'black'),
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            $('#myBoard').on('click', '.square-55d63', function() {
                handleSquareClick($(this).attr('data-square'));
            });
            if (playerColor === 'b') engineThink();
            updateStatus();
        }

        function updateStatus() {
            if (game.game_over()) {
                let reason = "Game Over";
                if (game.in_checkmate()) reason = "Checkmate! " + (game.turn() === 'w' ? 'Black' : 'White') + " wins.";
                else if (game.in_draw()) reason = "The game ended in a draw.";
                showEndScreen(reason);
            }
            const statusText = game.turn() === playerColor ? "Your Turn" : "Computer is thinking...";
            document.getElementById('status').innerText = statusText;
            document.getElementById('engine-info').innerText = "Rodent III Skill Level: 7 (Humanized)";
        }

        function removeHighlights() { $('#myBoard .square-55d63').removeClass('highlight-selected'); }

        function copyPGN() {
            const pgn = game.pgn();
            navigator.clipboard.writeText(pgn).then(() => alert("PGN copied to clipboard!"));
        }

        // --- DYNAMIC THUMBNAIL SHARING ---
        function share(platform) {
            // Generates a link to a static image of the current FEN
            const fen = game.fen().split(' ')[0]; // Get position only
            const thumbUrl = `https://chess-api.com/v1/image?fen=${encodeURIComponent(fen)}&theme=wikipedia&size=600`;
            
            const text = encodeURIComponent(`I just played a match against Rodent III AI! Check out the final position.`);
            const url = encodeURIComponent(window.location.href);
            let shareUrl = "";

            // We append the thumbnail URL to the message so platforms can unfurl it
            const fullMessage = `${text}%0AFinal Position: ${encodeURIComponent(thumbUrl)}%0A`;

            switch(platform) {
                case 'fb': shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}&picture=${encodeURIComponent(thumbUrl)}`; break;
                case 'x':  shareUrl = `https://twitter.com/intent/tweet?text=${fullMessage}&url=${url}`; break;
                case 'wa': shareUrl = `https://api.whatsapp.com/send?text=${fullMessage}%20${url}`; break;
                case 'ms': shareUrl = `fb-messenger://share/?link=${url}`; break;
            }
            
            window.open(shareUrl, '_blank');
        }
    </script>
</body>
</html>
