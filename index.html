<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rodent III - Fixed Stability Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #161512; --panel: #262421; --accent: #95bb4a; --text: #bababa; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .board-wrapper { width: 100%; max-width: 450px; aspect-ratio: 1; border: 4px solid #3c3934; }
        #myBoard { width: 100%; height: 100%; }
        .info-panel { background: var(--panel); padding: 15px; border-radius: 8px; width: 100%; max-width: 450px; border: 1px solid #3c3934; margin-bottom: 10px; text-align: center; }
        
        /* Overlays */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .card { background: var(--panel); padding: 25px; border-radius: 12px; width: 320px; border: 1px solid #444; text-align: center; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; font-weight: bold; border: none; }
        select { background: #333; color: white; }
        button { cursor: pointer; transition: 0.2s; background: var(--accent); color: #111; }
        button:hover { opacity: 0.9; }
        
        #pgn-output { background: #111; color: #777; padding: 10px; font-size: 11px; height: 50px; overflow-y: auto; width: 430px; margin-top: 10px; border: 1px solid #333; }
        .stat-line { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="setup-overlay" class="overlay">
        <div class="card">
            <h2>Rodent III Setup</h2>
            <label>Personality Level:</label>
            <select id="level-select">
                <option value="1000">Novice (1000 Elo)</option>
                <option value="1500" selected>Club Player (1500 Elo)</option>
                <option value="2000">Expert (2000 Elo)</option>
                <option value="2600">Grandmaster (2600 Elo)</option>
            </select>
            <label>Side:</label>
            <select id="side-select">
                <option value="w">White</option>
                <option value="b">Black</option>
            </select>
            <button onclick="startGame()">START GAME</button>
        </div>
    </div>

    <div id="analysis-overlay" class="overlay" style="display:none">
        <div class="card">
            <h2>Post-Game Review</h2>
            <div id="stats-container">Analyzing with Stockfish 18...</div>
            <button onclick="copyPGN()" style="background:#444; color:white">Copy PGN</button>
            <button onclick="location.reload()" style="margin-top:10px">New Game</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="status" style="color:var(--accent); font-weight:bold;">Waiting...</div>
        <div id="eval-info" style="font-size:0.8rem; color:#888;">Bot Strength: Rodent III</div>
    </div>

    <div class="board-wrapper"><div id="myBoard"></div></div>
    <div id="pgn-output"></div>

    <div style="display:flex; gap:10px; width:450px; margin-top:10px;">
        <button onclick="offerDraw()" style="background:#333; color:white">Offer Draw</button>
        <button onclick="confirmResign()" style="background:#333; color:#ff4d4d">Resign</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board, game = new Chess();
        var rodent = new WebSocket('wss://ProtonnDev-engine.hf.space/rodent3-fischer');
        var stockfish = new WebSocket('wss://ProtonnDev-engine.hf.space/stockfish18'); // For Analysis
        var playerSide = 'w', moveHistory = [];
        var engineEval = 0;

        function startGame() {
            const elo = document.getElementById('level-select').value;
            playerSide = document.getElementById('side-select').value;
            document.getElementById('setup-overlay').style.display = 'none';

            // Stabilize Engine UCI commands
            rodent.send("uci");
            rodent.send("setoption name UCI_LimitStrength value true");
            rodent.send(`setoption name UCI_Elo value ${elo}`);
            rodent.send("isready");
            rodent.send("ucinewgame");

            board = Chessboard('myBoard', {
                position: 'start',
                orientation: (playerSide === 'w' ? 'white' : 'black'),
                draggable: false,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            $('#myBoard').on('click', '.square-55d63', handleMove);
            if (playerSide === 'b') setTimeout(engineThink, 600);
            updateUI();
        }

        var source = null;
        function handleMove() {
            if (game.turn() !== playerSide || game.game_over()) return;
            const sq = $(this).data('square');
            const p = game.get(sq);

            if (p && p.color === playerSide) {
                source = sq;
                $('.square-55d63').css('box-shadow', 'none');
                $(this).css('box-shadow', 'inset 0 0 5px 5px #95bb4a');
            } else if (source) {
                const move = game.move({ from: source, to: sq, promotion: 'q' });
                if (move) {
                    source = null;
                    $('.square-55d63').css('box-shadow', 'none');
                    moveHistory.push(game.fen());
                    board.position(game.fen());
                    updateUI();
                    if (!isOver()) setTimeout(engineThink, 400);
                }
            }
        }

        function engineThink() {
            rodent.send(`position fen ${game.fen()}`);
            rodent.send("go depth 12");
        }

        // --- STABILITY FIX: Message filtering ---
        rodent.onmessage = (e) => {
            const msg = e.data;
            
            // Extract Score
            if (msg.includes('score cp')) {
                const match = msg.match(/score cp (-?\d+)/);
                if (match) engineEval = parseInt(match[1]);
            }

            // Extract Move - Only process if 'bestmove' is present
            if (msg.startsWith('bestmove')) {
                const moveStr = msg.split(' ')[1];
                if (moveStr && moveStr !== '(none)') {
                    game.move({ 
                        from: moveStr.substring(0, 2), 
                        to: moveStr.substring(2, 4), 
                        promotion: 'q' 
                    });
                    moveHistory.push(game.fen());
                    board.position(game.fen());
                    updateUI();
                    isOver();
                }
            }
        };

        function isOver() {
            if (game.game_over()) {
                setTimeout(startAnalysis, 800);
                return true;
            }
            return false;
        }

        // --- ANALYSIS (STOCKFISH 18) ---
        let aIdx = 0, lastS = 0.3, stats = { brilliant:0, best:0, mistake:0, blunder:0 };

        function startAnalysis() {
            document.getElementById('analysis-overlay').style.display = 'flex';
            stockfish.send("uci");
            analyzeStep();
        }

        function analyzeStep() {
            if (aIdx >= moveHistory.length) { finishAnalysis(); return; }
            stockfish.send(`position fen ${moveHistory[aIdx]}`);
            stockfish.send("go depth 14");
        }

        stockfish.onmessage = (e) => {
            if (e.data.includes('score cp')) {
                const s = parseInt(e.data.match(/score cp (-?\d+)/)[1]) / 100;
                const d = Math.abs(s - lastS);
                if (d < 0.1) stats.best++;
                else if (d > 2.8) stats.blunder++;
                else if (d > 1.1) stats.mistake++;
                if (d < 0.05 && Math.abs(s) > 2.0) stats.brilliant++;
                lastS = s; aIdx++; analyzeStep();
            }
        };

        function finishAnalysis() {
            document.getElementById('stats-container').innerHTML = `
                <div class="stat-line"><b>Brilliant:</b> <span>${stats.brilliant}</span></div>
                <div class="stat-line"><b>Best Moves:</b> <span>${stats.best}</span></div>
                <div class="stat-line"><b>Mistakes:</b> <span>${stats.mistake}</span></div>
                <div class="stat-line"><b>Blunders:</b> <span>${stats.blunder}</span></div>
            `;
        }

        function offerDraw() {
            const rel = (game.turn() === 'b' ? engineEval : -engineEval);
            if (rel > 120) alert("Rodent III declines.");
            else { alert("Draw accepted."); startAnalysis(); }
        }

        function confirmResign() {
            if (confirm("Resign?")) startAnalysis();
        }

        function copyPGN() { navigator.clipboard.writeText(game.pgn()); alert("Copied!"); }
        function updateUI() { 
            document.getElementById('status').innerText = game.turn() === playerSide ? "Your Turn" : "Rodent III Thinking...";
            document.getElementById('pgn-output').innerText = game.pgn() || "No moves yet.";
        }
    </script>
</body>
</html>
