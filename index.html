<!DOCTYPE html>
<html>
<head>
    <title>Rodent III - One Touch Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #262421; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        #myBoard { margin: 0 auto; width: 450px; border: 2px solid #403d39; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .info-panel { background: #312e2b; padding: 15px; border-radius: 8px; display: inline-block; margin-bottom: 20px; min-width: 400px; }
        .status { font-weight: bold; color: #95bb4a; margin-bottom: 10px; font-size: 1.1em; }
        button { background: #454341; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        button:hover { background: #53504d; }
        
        /* The "Selected" look */
        .highlight-selected { background-color: rgba(255, 255, 0, 0.5) !important; }
        /* The "Hint" for captures or moves */
        .highlight-hint { background-color: rgba(255, 0, 0, 0.3) !important; }

        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: #262421; padding: 40px; border-radius: 12px; border: 1px solid #454341; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="modal">
            <h2>Choose Your Side</h2>
            <button onclick="startGame('w')">Play as White</button>
            <button onclick="startGame('b')">Play as Black</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="status" class="status">Connecting to engine...</div>
        <div id="turn-indicator">Waiting for start...</div>
    </div>

    <div id="myBoard"></div>

    <div style="margin-top:20px;">
        <button onclick="location.reload()">New Game</button>
        <button onclick="alert('The engine refuses to draw!')">Offer Draw</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var playerColor = 'w';
        var selectedSquare = null;
        var socket = new WebSocket('wss://ProtonnDev-engine.hf.space/rodent3-fischer');

        socket.onopen = () => { socket.send("uci"); };
        socket.onmessage = (e) => {
            if (e.data.startsWith('bestmove')) {
                const moveStr = e.data.split(' ')[1];
                game.move({ from: moveStr.substring(0, 2), to: moveStr.substring(2, 4), promotion: 'q' });
                board.position(game.fen());
                checkGameOver();
                updateStatus();
            }
        };

        function removeHighlights() {
            $('#myBoard .square-55d63').removeClass('highlight-selected highlight-hint');
        }

        // --- IMPROVED ONE-TOUCH LOGIC ---
        function handleSquareClick(square) {
            // Can't move if it's not your turn
            if (game.turn() !== playerColor) return;

            const pieceOnSquare = game.get(square);

            // CASE 1: Selecting your own piece for the first time or switching pieces
            if (pieceOnSquare && pieceOnSquare.color === playerColor) {
                removeHighlights();
                selectedSquare = square;
                $(`#myBoard .square-${square}`).addClass('highlight-selected');
                return;
            }

            // CASE 2: You already have a piece selected and you're clicking a target (empty or enemy)
            if (selectedSquare) {
                const move = game.move({
                    from: selectedSquare,
                    to: square,
                    promotion: 'q' // Auto-promote to queen
                });

                if (move === null) {
                    // Invalid move - just deselect
                    selectedSquare = null;
                    removeHighlights();
                } else {
                    // Valid Move or Capture!
                    removeHighlights();
                    selectedSquare = null;
                    board.position(game.fen());
                    updateStatus();
                    checkGameOver();
                    
                    // Engine's turn
                    window.setTimeout(engineThink, 300);
                }
            }
        }

        function engineThink() {
            if (game.game_over()) return;
            socket.send(`position fen ${game.fen()}`);
            socket.send("go movetime 1000");
        }

        function startGame(side) {
            playerColor = side;
            document.getElementById('overlay').style.display = 'none';
            
            board = Chessboard('myBoard', {
                position: 'start',
                orientation: (side === 'w' ? 'white' : 'black'),
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            // Attach the click event to the squares
            $('#myBoard').on('click', '.square-55d63', function() {
                const square = $(this).attr('data-square');
                handleSquareClick(square);
            });

            if (playerColor === 'b') engineThink();
            updateStatus();
        }

        function updateStatus() {
            const turnText = (game.turn() === playerColor) ? "Your Turn" : "Computer is thinking...";
            document.getElementById('turn-indicator').innerText = turnText;
            document.getElementById('status').innerText = game.in_check() ? "CHECK!" : "Game in Progress";
        }

        function checkGameOver() {
            if (game.in_checkmate()) {
                const winner = game.turn() === 'w' ? 'Black' : 'White';
                alert("CHECKMATE! " + winner + " wins.");
            } else if (game.in_draw() || game.in_stalemate()) {
                alert("Game Over: Draw");
            }
        }

    </script>
</body>
</html>
