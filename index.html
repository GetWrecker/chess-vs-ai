<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rodent III vs Stockfish 18 Analysis</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #161512; --panel: #262421; --accent: #95bb4a; --text: #bababa; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .board-wrapper { width: 450px; height: 450px; margin: 10px; border: 4px solid #3c3934; }
        #myBoard { width: 100%; height: 100%; }
        .info-panel { background: var(--panel); padding: 15px; border-radius: 8px; width: 450px; border: 1px solid #3c3934; margin-bottom: 10px; text-align: center; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 480px; }
        button { background: #3c3934; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #4c4944; }
        #pgn-display { background: #111; color: #777; padding: 10px; font-family: monospace; font-size: 11px; height: 50px; overflow-y: auto; width: 460px; margin-top: 10px; border: 1px solid #333; }
        
        /* Modal for Analysis */
        #analysis-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .report-card { background: var(--panel); padding: 30px; border-radius: 12px; width: 380px; text-align: center; color: white; }
        .stat-line { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .brilliant { color: #00ebff; font-weight: bold; }
        .blunder { color: #ff4d4d; font-weight: bold; }
        
        #setup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="setup-modal" style="background:var(--panel); padding:30px; border-radius:12px; text-align:center;">
            <h2>Choose Bot Level</h2>
            <select id="level-select" style="width:100%; padding:10px; margin-bottom:20px;">
                <option value="1">Beginner (Level 1)</option>
                <option value="5">Intermediate (Level 5)</option>
                <option value="10">Expert (Level 10)</option>
                <option value="15">Master (Level 15)</option>
                <option value="20">Grandmaster (Level 20)</option>
            </select>
            <button onclick="initGame()" style="background:var(--accent); color:black; width:100%; padding:15px; font-weight:bold; cursor:pointer;">START GAME</button>
        </div>
    </div>

    <div id="analysis-modal">
        <div class="report-card">
            <h2 id="result-title">Game Over</h2>
            <div id="stat-container">Analyzing Moves with Stockfish 18...</div>
            <hr style="border:1px solid #444; margin:20px 0;">
            <button onclick="copyPGN()" style="width:100%; margin-bottom:10px;">Copy PGN</button>
            <button onclick="shareSocial()" style="width:100%; background:#3b5998;">Share on Social Media</button>
            <button onclick="location.reload()" style="width:100%; margin-top:10px; background:none; border:1px solid #555;">New Game</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="status" style="color:var(--accent); font-weight:bold;">Initializing...</div>
        <div id="move-count" style="font-size:0.8em; color:#888;">Moves: 0</div>
    </div>

    <div class="board-wrapper"><div id="myBoard"></div></div>

    <div id="pgn-display">PGN Record...</div>

    <div class="controls">
        <button onclick="offerDraw()">Offer Draw</button>
        <button onclick="handleResign()" style="color:#ef4444;">Resign</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board, game = new Chess();
        var rodent = new WebSocket('wss://ProtonnDev-engine.hf.space/rodent3-fischer');
        var stockfish = new WebSocket('wss://ProtonnDev-engine.hf.space/stockfish18');
        var moveHistory = [];
        var analysisResults = { brilliant: 0, best: 0, mistake: 0, blunder: 0 };
        var playerColor = 'w';

        function initGame() {
            const lvl = document.getElementById('level-select').value;
            document.getElementById('setup-overlay').style.display = 'none';
            rodent.send("uci");
            rodent.send(`setoption name Skill Level value ${lvl}`);
            stockfish.send("uci");
            board = Chessboard('myBoard', { position: 'start', draggable: false, pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png' });
            $('#myBoard').on('click', '.square-55d63', onSquareClick);
            updateUI();
        }

        var selectedSq = null;
        function onSquareClick() {
            const sq = $(this).data('square');
            if (game.turn() !== playerColor) return;
            if (selectedSq === sq) { deselect(); return; }
            const p = game.get(sq);
            if (p && p.color === playerColor) {
                deselect();
                selectedSq = sq;
                $(`.square-${sq}`).css('box-shadow', 'inset 0 0 3px 3px yellow');
            } else if (selectedSq) {
                const move = game.move({ from: selectedSq, to: sq, promotion: 'q' });
                if (move) {
                    moveHistory.push(game.fen());
                    board.position(game.fen());
                    deselect();
                    updateUI();
                    if (game.game_over()) { triggerAnalysis(); }
                    else { setTimeout(opponentMove, 400); }
                }
            }
        }

        function deselect() { selectedSq = null; $('.square-55d63').css('box-shadow', 'none'); }
        function opponentMove() { rodent.send(`position fen ${game.fen()}`); rodent.send("go depth 12"); }

        rodent.onmessage = (e) => {
            if (e.data.startsWith('bestmove')) {
                const m = e.data.split(' ')[1];
                game.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: 'q' });
                moveHistory.push(game.fen());
                board.position(game.fen());
                updateUI();
                if (game.game_over()) triggerAnalysis();
            }
        };

        // --- ANALYSIS LOGIC ---
        let currentAnalysisIdx = 0;
        let lastEval = 0.3;

        function triggerAnalysis() {
            document.getElementById('analysis-modal').style.display = 'flex';
            analyzeNextMove();
        }

        function analyzeNextMove() {
            if (currentAnalysisIdx >= moveHistory.length) {
                showFinalReport();
                return;
            }
            stockfish.send(`position fen ${moveHistory[currentAnalysisIdx]}`);
            stockfish.send("go depth 14");
        }

        stockfish.onmessage = (e) => {
            if (e.data.includes('score cp')) {
                const match = e.data.match(/score cp (-?\d+)/);
                if (match) {
                    let score = parseInt(match[1]) / 100;
                    let diff = Math.abs(score - lastEval);
                    
                    // Classification Heuristics
                    if (diff < 0.1) analysisResults.best++;
                    else if (diff > 3.0) analysisResults.blunder++;
                    else if (diff > 1.2) analysisResults.mistake++;
                    // Brilliant logic: high depth sacrifice (simplified for client-side)
                    if (diff < 0.05 && score > 2.0) analysisResults.brilliant++;

                    lastEval = score;
                    currentAnalysisIdx++;
                    analyzeNextMove();
                }
            }
        };

        function showFinalReport() {
            document.getElementById('stat-container').innerHTML = `
                <div class="stat-line"><span class="brilliant">Brilliant Moves</span> <span>${analysisResults.brilliant}</span></div>
                <div class="stat-line"><span>Best Moves</span> <span>${analysisResults.best}</span></div>
                <div class="stat-line"><span>Mistakes</span> <span>${analysisResults.mistake}</span></div>
                <div class="stat-line"><span class="blunder">Blunders</span> <span>${analysisResults.blunder}</span></div>
            `;
        }

        function shareSocial() {
            const text = `I just played a game against Rodent III! Moves: ${game.history().length}. Check out my PGN!`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`);
        }

        function copyPGN() { navigator.clipboard.writeText(game.pgn()); alert("PGN Copied to clipboard!"); }
        function offerDraw() { alert("Computer evaluation: Declines."); }
        function handleResign() { if (confirm("Resign?")) location.reload(); }
        function updateUI() { 
            document.getElementById('status').innerText = game.turn() === 'w' ? "Your Turn" : "Opponent Thinking...";
            document.getElementById('move-count').innerText = "Moves: " + Math.floor(game.history().length / 2);
            document.getElementById('pgn-display').innerText = game.pgn();
        }
    </script>
</body>
</html>
