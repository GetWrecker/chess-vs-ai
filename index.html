<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Chess - Rodent III vs Stockfish 18</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #161512; --panel: #262421; --accent: #95bb4a; --text: #bababa; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Board Container */
        .board-container { position: relative; width: 450px; height: 450px; margin: 10px; }
        #myBoard { width: 100%; height: 100%; border: 4px solid #3c3934; }
        
        /* SVG Arrow Layer */
        #drawing-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        
        .info-panel { background: var(--panel); padding: 15px; border-radius: 8px; width: 450px; border: 1px solid #3c3934; margin-bottom: 10px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 480px; }
        button { background: #3c3934; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #4c4944; }
        
        #pgn-area { background: #111; color: #71717a; padding: 10px; font-family: monospace; font-size: 11px; height: 50px; overflow-y: auto; width: 460px; margin-top: 10px; border-radius: 4px; border: 1px solid #333; }
        
        #setup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .setup-modal { background: var(--panel); padding: 30px; border-radius: 12px; width: 350px; text-align: center; border: 1px solid #444; }
        select { width: 100%; padding: 10px; margin: 10px 0; background: #333; color: white; border: 1px solid #555; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="setup-modal">
            <h2 style="color:white">Game Engine Setup</h2>
            <label>Opponent Strength (Rodent III):</label>
            <select id="level-select">
                <option value="1">Beginner (Level 1)</option>
                <option value="7" selected>Intermediate (Level 7)</option>
                <option value="12">Expert (Level 12)</option>
                <option value="20">Grandmaster (Level 20)</option>
            </select>
            <label>Coaching (Stockfish 18):</label>
            <select id="coach-select">
                <option value="on">Enable Best-Move Arrows</option>
                <option value="off">Disable Coaching</option>
            </select>
            <button onclick="initGame()" style="background: var(--accent); color: black; width: 100%; margin-top: 20px;">PLAY NOW</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="status" style="color: var(--accent); font-weight: bold;">Opponent: Rodent III</div>
        <div id="eval-text" style="font-size: 0.85em; color: #8a8a8a;">Coach Status: Ready</div>
    </div>

    <div class="board-container">
        <div id="myBoard"></div>
        <svg id="drawing-layer" viewBox="0 0 100 100" preserveAspectRatio="none">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orientation="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="rgba(149, 187, 74, 0.8)" />
                </marker>
            </defs>
        </svg>
    </div>

    <div id="pgn-area">PGN Record will appear here...</div>

    <div class="controls">
        <button onclick="copyPGN()">Copy PGN</button>
        <button onclick="location.reload()" style="background:#ef4444">Resign</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board, game = new Chess();
        var coachEnabled = true;
        var rodentSocket = new WebSocket('wss://ProtonnDev-engine.hf.space/rodent3-fischer');
        var stockfishSocket = new WebSocket('wss://ProtonnDev-engine.hf.space/stockfish18');

        // 1. Initialize
        function initGame() {
            const level = document.getElementById('level-select').value;
            coachEnabled = document.getElementById('coach-select').value === 'on';
            document.getElementById('setup-overlay').style.display = 'none';

            rodentSocket.send("uci");
            rodentSocket.send(`setoption name Skill Level value ${level}`);
            stockfishSocket.send("uci");

            board = Chessboard('myBoard', {
                position: 'start',
                draggable: false, // Using One-Touch only
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            $('#myBoard').on('click', '.square-55d63', function() {
                handleSquareClick($(this).attr('data-square'));
            });

            if (coachEnabled) requestCoachHint();
        }

        // 2. Click-to-Move Logic
        var selectedSq = null;
        function handleSquareClick(sq) {
            if (game.turn() !== 'w') return; // Player is White

            if (selectedSq === sq) {
                deselect();
                return;
            }

            const piece = game.get(sq);
            if (piece && piece.color === 'w') {
                deselect();
                selectedSq = sq;
                $(`.square-${sq}`).css('background', 'rgba(255, 255, 0, 0.4)');
            } else if (selectedSq) {
                const move = game.move({ from: selectedSq, to: sq, promotion: 'q' });
                if (move) {
                    board.position(game.fen());
                    deselect();
                    clearArrows();
                    updateUI();
                    setTimeout(engineMove, 500);
                } else {
                    deselect();
                }
            }
        }

        function deselect() {
            selectedSq = null;
            $('.square-55d63').css('background', '');
        }

        // 3. Engine Communication
        function engineMove() {
            rodentSocket.send(`position fen ${game.fen()}`);
            rodentSocket.send("go depth 12");
        }

        rodentSocket.onmessage = (e) => {
            if (e.data.includes('bestmove')) {
                const move = e.data.split(' ')[1];
                game.move({ from: move.substring(0, 2), to: move.substring(2, 4), promotion: 'q' });
                board.position(game.fen());
                updateUI();
                if (coachEnabled) requestCoachHint();
            }
        };

        // 4. Stockfish 18 Arrow Logic
        function requestCoachHint() {
            stockfishSocket.send(`position fen ${game.fen()}`);
            stockfishSocket.send("go depth 18");
        }

        stockfishSocket.onmessage = (e) => {
            if (e.data.includes('bestmove') && coachEnabled && game.turn() === 'w') {
                const best = e.data.split(' ')[1];
                drawArrow(best.substring(0, 2), best.substring(2, 4));
            }
        };

        // 5. Drawing the Arrow
        function drawArrow(from, to) {
            clearArrows();
            const fromCoords = getSquareCenter(from);
            const toCoords = getSquareCenter(to);

            const svg = document.getElementById('drawing-layer');
            const arrow = document.createElementNS("http://www.w3.org/2000/svg", "line");
            
            arrow.setAttribute("x1", fromCoords.x);
            arrow.setAttribute("y1", fromCoords.y);
            arrow.setAttribute("x2", toCoords.x);
            arrow.setAttribute("y2", toCoords.y);
            arrow.setAttribute("stroke", "rgba(149, 187, 74, 0.7)");
            arrow.setAttribute("stroke-width", "2");
            arrow.setAttribute("marker-end", "url(#arrowhead)");
            
            svg.appendChild(arrow);
            document.getElementById('eval-text').innerText = `Stockfish 18 Suggests: ${from}→${to}`;
        }

        function getSquareCenter(sq) {
            const files = 'abcdefgh';
            const file = files.indexOf(sq[0]);
            const rank = 8 - parseInt(sq[1]);
            // Convert to 0-100 scale for SVG viewBox
            return { x: (file * 12.5) + 6.25, y: (rank * 12.5) + 6.25 };
        }

        function clearArrows() {
            $('#drawing-layer line').remove();
            document.getElementById('eval-text').innerText = "Analyzing...";
        }

        function updateUI() {
            document.getElementById('pgn-area').innerText = game.pgn();
        }

        function copyPGN() {
            navigator.clipboard.writeText(game.pgn());
            alert("PGN Copied!");
        }
    </script>
</body>
</html>
